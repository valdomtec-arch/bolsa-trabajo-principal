<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolsa de Trabajo - Súmate a Nuestro Equipo</title>
    <style>
        :root {
            --primary-orange: #ff6600;
            --secondary-blue: #0f2a4a;
            --light-bg: #f4f7f6;
            --white: #ffffff;
            --green-whatsapp: #25D366;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--light-bg);
            color: #333;
            line-height: 1.6;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: var(--white);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 3px solid var(--primary-orange);
            padding-bottom: 20px;
        }

        header h1 {
            color: var(--secondary-blue);
            font-size: 2rem;
            text-transform: uppercase;
        }

        header p {
            color: var(--primary-orange);
            font-weight: bold;
            font-size: 1.2rem;
        }

        /* --- GALERÍA DINÁMICA CON CARRUSEL --- */
        .gallery-section {
            margin-bottom: 35px;
        }

        .gallery-section h2 {
            color: var(--secondary-blue);
            font-size: 1.3rem;
            margin-bottom: 15px;
            text-align: center;
        }

        .gallery-container {
            position: relative;
            overflow: hidden;
            background: #fafafa;
            padding: 20px 0;
            border-radius: 8px;
        }

        .gallery-wrapper {
            display: flex;
            transition: transform 0.5s ease-in-out;
        }

        .image-card {
            min-width: calc(33.333% - 14px);
            background: #fff;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            border: 1px solid #e1e1e1;
            text-align: center;
            margin: 0 10px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .image-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.15);
        }

        .image-card img {
            max-width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 6px;
            display: block;
            margin: 0 auto 10px auto;
        }

        .image-card span {
            font-size: 0.95rem;
            font-weight: bold;
            color: var(--secondary-blue);
            display: block;
        }

        /* Botones de navegación */
        .gallery-nav {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }

        .nav-btn {
            background-color: var(--primary-orange);
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            transition: background-color 0.3s ease;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-btn:hover {
            background-color: var(--secondary-blue);
        }

        .nav-btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        /* Indicador de página */
        .gallery-indicator {
            text-align: center;
            margin-top: 15px;
            color: var(--secondary-blue);
            font-weight: bold;
        }

        /* Sección de Botones de Enlace */
        .links-section {
            margin-bottom: 35px;
        }

        .links-section h2 {
            color: var(--secondary-blue);
            font-size: 1.3rem;
            margin-bottom: 15px;
            text-align: center;
        }

        .button-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .btn-link {
            display: block;
            text-align: center;
            background-color: var(--secondary-blue);
            color: var(--white);
            padding: 12px 20px;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            transition: background 0.3s ease;
        }

        .btn-link:hover {
            background-color: var(--primary-orange);
        }

        /* Formulario */
        .form-section {
            background: #f9f9f9;
            padding: 25px;
            border-radius: 8px;
            border: 1px solid #e1e1e1;
        }

        .form-section h2 {
            color: var(--secondary-blue);
            margin-bottom: 20px;
            font-size: 1.4rem;
            text-align: center;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #555;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 1rem;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--primary-orange);
        }

        .btn-whatsapp {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            background-color: var(--green-whatsapp);
            color: white;
            border: none;
            padding: 14px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.3s ease;
        }

        .btn-whatsapp:hover {
            background-color: #1eaf52;
        }

        .btn-whatsapp svg {
            margin-right: 10px;
            fill: white;
            width: 24px;
            height: 24px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .image-card {
                min-width: calc(50% - 14px);
            }

            header h1 {
                font-size: 1.5rem;
            }

            .container {
                padding: 15px;
            }
        }

        @media (max-width: 480px) {
            .image-card {
                min-width: calc(50% - 14px);
            }

            header h1 {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>¡Súmate a nuestro equipo!</h1>
        <p>Tu talento hace la diferencia</p>
    </header>

    <section class="gallery-section">
        <h2>Ofertas de Empleo Disponibles</h2>
        <div class="gallery-container">
            <div class="gallery-wrapper" id="galleryWrapper">
                <div class="image-card">
                    <img src="imagen-soriana.jpg" alt="Vacantes Soriana Tlaquepaque">
                    <span>Soriana Tlaquepaque</span>
                </div>

                <div class="image-card">
                    <img src="imagen-topband.jpg" alt="Vacantes Top Band">
                    <span>Top Band</span>
                </div>

                <div class="image-card">
                    <img src="imagen-fimex.jpg" alt="Vacantes FIMEX">
                    <span>FIMEX</span>
                </div>

                <div class="image-card">
                    <img src="imagen-macor.jpg" alt="Vacantes Macor de México">
                    <span>Macor de México</span>
                </div>

                <div class="image-card">
                    <img src="imagen-yu-joung.jpg" alt="Vacantes Ju-Young">
                    <span>Ju-Young</span>
                </div>
            </div>
        </div>

        <div class="gallery-nav">
            <button class="nav-btn" id="prevBtn" onclick="previousGroup()" title="Anterior">◀</button>
            <button class="nav-btn" id="nextBtn" onclick="nextGroup()" title="Siguiente">▶</button>
        </div>
        <div class="gallery-indicator" id="indicator">Grupo 1 de 2</div>
    </section>

    <section class="links-section">
        <h2>Visita nuestras Bolsas de Trabajo Oficiales</h2>
        <div class="button-group">
            <a href="https://valdomtec-arch.github.io/bolsa-trabajo-topband/" target="_blank" class="btn-link">Top Band</a>
            <a href="https://valdomtec-arch.github.io/bolsa-trabajo-soriana-tlaquepaque/" target="_blank" class="btn-link">Soriana Tlaquepaque</a>
            <a href="https://valdomtec-arch.github.io/bolsa-trabajo-fimex/" target="_blank" class="btn-link">FIMEX</a>
            <a href="https://valdomtec-arch.github.io/bolsa-trabajo-macor-de-mexico/" target="_blank" class="btn-link">Macor de México</a>
            <a href="https://valdomtec-arch.github.io/bolsa-trabajo-yu-joung/" target="_blank" class="btn-link">Ju-Young</a>
        </div>
    </section>

    <section class="form-section">
        <h2>Registro de Candidato</h2>
        <form id="jobForm">
            <div class="form-group">
                <label for="nombre">Nombre y Apellido:</label>
                <input type="text" id="nombre" required placeholder="Ej. Juan Pérez">
            </div>

            <div class="form-group">
                <label for="curp">CURP:</label>
                <input type="text" id="curp" required maxlength="18" placeholder="Ingresa tu CURP" style="text-transform: uppercase;">
            </div>

            <div class="form-group">
                <label for="telefono">Teléfono:</label>
                <input type="tel" id="telefono" required placeholder="Ej. 3312345678">
            </div>

            <div class="form-group">
                <label for="edad">Edad:</label>
                <input type="number" id="edad" required min="18" max="65" placeholder="Ej. 25">
            </div>

            <div class="form-group">
                <label for="empresa">Empresa de Interés:</label>
                <select id="empresa" required>
                    <option value="">Selecciona una empresa</option>
                    <option value="Top Band">Top Band</option>
                    <option value="Soriana Tlaquepaque">Soriana Tlaquepaque</option>
                    <option value="FIMEX">FIMEX</option>
                    <option value="Macor de México">Macor de México</option>
                    <option value="Ju-Young">Ju-Young</option>
                </select>
            </div>

            <div class="form-group">
                <label for="vacante">Vacante a la que postula:</label>
                <input type="text" id="vacante" required placeholder="Ej. Maniobrista / Ayudante General">
            </div>

            <button type="button" class="btn-whatsapp" onclick="enviarWhatsApp()">
                <svg viewBox="0 0 24 24">
                    <path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946C.06 5.348 5.397.01 12.008.01c3.202.001 6.212 1.246 8.477 3.513 2.266 2.268 3.507 5.28 3.505 8.484-.004 6.657[...]
                </svg>
                Enviar Postulación por WhatsApp
            </button>
        </form>
    </section>
</div>

<script>
    let currentPage = 0;
    let itemsPerPage = 3;
    const totalItems = document.querySelectorAll('.image-card').length;

    function getItemsPerPage() {
        const width = window.innerWidth;
        if (width <= 768) {
            return 2; // En tablet y móvil: 2 imágenes por página
        }
        return 3; // En escritorio: 3 imágenes por página
    }

    function updateItemsPerPage() {
        itemsPerPage = getItemsPerPage();
        currentPage = 0; // Reinicia a la primera página
        updateGallery();
    }

    function updateGallery() {
        const wrapper = document.getElementById('galleryWrapper');
        const totalPages = Math.ceil(totalItems / itemsPerPage);
        const offset = currentPage * itemsPerPage * -1;
        wrapper.style.transform = `translateX(${offset * 100 / itemsPerPage}%)`;
        
        document.getElementById('indicator').textContent = `Grupo ${currentPage + 1} de ${totalPages}`;
        
        document.getElementById('prevBtn').disabled = currentPage === 0;
        document.getElementById('nextBtn').disabled = currentPage === totalPages - 1;
    }

    function nextGroup() {
        const totalPages = Math.ceil(totalItems / itemsPerPage);
        if (currentPage < totalPages - 1) {
            currentPage++;
            updateGallery();
        }
    }

    function previousGroup() {
        if (currentPage > 0) {
            currentPage--;
            updateGallery();
        }
    }

    // Inicializar galería
    updateItemsPerPage();

    // Actualizar cuando cambia el tamaño de la ventana
    window.addEventListener('resize', updateItemsPerPage);

    function enviarWhatsApp() {
        const telefonoReclutador = "526461974763"; 

        const nombre = document.getElementById('nombre').value.trim();
        const curp = document.getElementById('curp').value.trim().toUpperCase();
        const telefono = document.getElementById('telefono').value.trim();
        const edad = document.getElementById('edad').value.trim();
        const empresa = document.getElementById('empresa').value;
        const vacante = document.getElementById('vacante').value.trim();

        if (!nombre || !curp || !telefono || !edad || !empresa || !vacante) {
            alert("Por favor, complete todos los campos antes de enviar.");
            return;
        }

        const mensaje = `*NUEVA POSTULACIÓN*%0A%0A` +
                        `• *Nombre y Apellido:* ${nombre}%0A` +
                        `• *CURP:* ${curp}%0A` +
                        `• *Teléfono:* ${telefono}%0A` +
                        `• *Edad:* ${edad} años%0A` +
                        `• *Empresa:* ${empresa}%0A` +
                        `• *Vacante:* ${vacante}`;

        const urlWhatsApp = `https://api.whatsapp.com/send?phone=${telefonoReclutador}&text=${mensaje}`;
        window.open(urlWhatsApp, '_blank');
    }
</script>

</body>
</html>
