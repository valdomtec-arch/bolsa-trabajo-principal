<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolsa de Trabajo - Súmate a Nuestro Equipo</title>
    <meta property="og:title" content="Bolsa de Trabajo Oficial | ¡Súmate a nuestro equipo!" />
    <meta property="og:description" content="Encuentra tu próximo empleo hoy mismo. Regístrate en pocos minutos y agenda tu entrevista directamente por WhatsApp." />
    <meta property="og:url" content="https://valdomtec-arch.github.io/bolsa-trabajo-principal/" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://valdomtec-arch.github.io/bolsa-trabajo-principal/imagen-logo.jpg" />
    <style>
        /* ... TUS ESTILOS CSS PERMANECEN EXACTAMENTE IGUAL ... */
        :root {
            --primary-orange: #ff6600;
            --primary-orange-hover: #e05500;
            --primary-orange-glow: rgba(255, 102, 0, 0.4);
            --secondary-blue: #0f2a4a;
            --secondary-blue-dark: #06101e;
            --bg-page: #030712;          
            --container-bg: #0b1329;     
            --card-bg: rgba(20, 35, 65, 0.6);          
            --bg-form: #0d1b3e;          
            --input-bg: #15264a;         
            --white: #ffffff;
            --text-light: #f1f5f9;       
            --text-muted: #94a3b8;       
            --green-whatsapp: #22c55e;
            --green-whatsapp-hover: #16a34a;
            --border-color: rgba(30, 58, 138, 0.4);     
            --radius-lg: 24px;
            --radius-md: 16px;
            --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.4);
            --shadow-md: 0 12px 25px -5px rgba(0, 0, 0, 0.6);
            --shadow-lg: 0 30px 60px -15px rgba(0, 0, 0, 0.8);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
        body { background: radial-gradient(circle at 50% 0%, #0d1e3d 0%, var(--bg-page) 80%); color: var(--text-light); line-height: 1.6; padding: 40px 20px; min-height: 100vh; }
        .container { max-width: 1000px; margin: 0 auto; background: var(--container-bg); padding: 45px; border-radius: var(--radius-lg); box-shadow: var(--shadow-lg); border: 1px solid rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); }
        header { text-align: center; margin-bottom: 45px; background: linear-gradient(135deg, #091a36 0%, var(--secondary-blue-dark) 100%); padding: 45px 20px; border-radius: var(--radius-md); position: relative; overflow: hidden; border-top: 1px solid rgba(255, 102, 0, 0.3); border-bottom: 4px solid var(--primary-orange); box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5), 0 0 30px rgba(255, 102, 0, 0.1); }
        .logo-header { max-width: 280px; width: 100%; height: auto; }
        header h1 { color: var(--white); font-size: 2.2rem; margin-bottom: 8px; }
        header p { color: var(--primary-orange); font-weight: 700; }
        .search-container { max-width: 550px; margin: -25px auto 45px auto; position: relative; z-index: 10; }
        .search-input { width: 100%; padding: 18px 24px 18px 55px; border-radius: 50px; border: 2px solid rgba(255, 102, 0, 0.15); background-color: #0d182e; color: white; }
        .gallery-container { position: relative; overflow: hidden; background: rgba(3, 7, 18, 0.4); padding: 25px 15px; border-radius: var(--radius-lg); min-height: 310px; }
        .gallery-wrapper { display: flex; transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1); }
        .image-card { min-width: calc(50% - 24px); background: var(--card-bg); padding: 24px; border-radius: var(--radius-md); margin: 0 12px; }
        .links-section { background: var(--bg-form); padding: 40px 35px; border-radius: var(--radius-lg); margin-top: 50px; }
        .button-group { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; }
        .btn-link { display: flex; align-items: center; justify-content: center; background-color: #0a1426; color: white; padding: 16px; text-decoration: none; border-radius: var(--radius-md); font-weight: 700; transition: 0.3s; }
        .btn-link:hover { background: var(--primary-orange); }
        .form-section { background: var(--bg-form); padding: 45px 40px; border-radius: var(--radius-lg); margin-top: 50px; }
        .form-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px; }
        .floating-group { position: relative; margin-bottom: 8px; }
        .floating-group input, .floating-group select { width: 100%; padding: 22px 16px 8px 16px; border-radius: var(--radius-md); border: 2px solid rgba(255, 255, 255, 0.05); background-color: var(--input-bg); color: white; }
        .btn-whatsapp { display: flex; width: 100%; background: var(--green-whatsapp); color: white; padding: 18px; border: none; border-radius: var(--radius-md); font-weight: 700; cursor: pointer; justify-content: center; gap: 10px; }
        .whatsapp-float { position: fixed; width: 65px; height: 65px; bottom: 35px; right: 35px; background-color: var(--green-whatsapp); color: #FFF; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 32px; z-index: 100; box-shadow: 0px 8px 24px rgba(0, 0, 0, 0.6); }
        @media (max-width: 768px) { .form-grid { grid-template-columns: 1fr; } }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div class="container">
    <header>
        <div class="logo-container"><img src="imagen-logo.jpg" alt="HR Employment" class="logo-header"></div>
        <h1>¡Súmate a nuestro equipo!</h1>
        <p>Tu talento hace la diferencia</p>
    </header>

    <div class="search-container">
        <div class="search-wrapper">
            <input type="text" id="mainSearch" class="search-input" placeholder="Buscar por empresa, vacante o ubicación...">
            <i class="fas fa-search search-icon"></i>
        </div>
    </div>

    <section class="gallery-section">
        <h2>Ofertas de Empleo Disponibles</h2>
        <div class="gallery-container" id="galleryContainer">
            <div class="gallery-wrapper" id="galleryWrapper">
                <div class="skeleton-card"></div>
            </div>
        </div>
        <div class="gallery-nav" id="galleryNavControls">
            <button class="nav-btn" id="prevBtn" onclick="previousGroup()"><i class="fas fa-chevron-left"></i></button>
            <div class="gallery-indicator" id="indicator">Cargando...</div>
            <button class="nav-btn" id="nextBtn" onclick="nextGroup()"><i class="fas fa-chevron-right"></i></button>
        </div>
    </section>

    <section class="links-section">
        <h2>Visita nuestras Bolsas de Trabajo Oficiales</h2>
        <div class="button-group" id="linksGroup"></div>
    </section>

    <section class="form-section">
        <h2>Registro de Candidato</h2>
        <form id="jobForm" novalidate>
            <div class="form-grid">
                <div class="form-group floating-group"><input type="text" id="nombre" required placeholder=" "><label>Nombre y Apellido</label></div>
                <div class="form-group floating-group"><input type="text" id="curp" required maxlength="18" placeholder=" "><label>CURP</label></div>
                <div class="form-group floating-group"><input type="tel" id="telefono" required maxlength="10" placeholder=" "><label>Teléfono</label></div>
                <div class="form-group floating-group"><input type="number" id="edad" required placeholder=" "><label>Edad</label></div>
                <div class="form-group floating-group"><select id="empresa" required><option value="" disabled selected></option></select><label>Empresa</label></div>
                <div class="form-group floating-group"><select id="vacante" required disabled><option value="" disabled selected></option></select><label>Vacante</label></div>
            </div>
            <button type="button" class="btn-whatsapp" onclick="enviarWhatsApp()">Enviar Postulación</button>
        </form>
    </section>
</div>

<a href="https://api.whatsapp.com/send?phone=526461974763" class="whatsapp-float" target="_blank"><i class="fab fa-whatsapp"></i></a>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, set, push, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = { databaseURL: "https://bolsa-de-trabajo-a52e4-default-rtdb.firebaseio.com/" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    
    // 1. Lógica de Contador de Visitas (Se ejecuta al cargar la página)
    const visitasRef = ref(db, 'visitas/total');
    set(visitasRef, increment(1));

    // 2. Lógica de envío de postulación y registro en Firebase
    window.enviarWhatsApp = function() {
        const nombre = document.getElementById('nombre').value.trim();
        const curp = document.getElementById('curp').value.trim();
        const telefono = document.getElementById('telefono').value.trim();
        const edad = document.getElementById('edad').value.trim();
        const empresa = document.getElementById('empresa').options[document.getElementById('empresa').selectedIndex].text;
        const vacante = document.getElementById('vacante').value;

        if(!nombre || !telefono || !empresa) {
            alert("Por favor, completa todos los campos.");
            return;
        }

        // A. Guardar en Firebase
        push(ref(db, 'candidatos'), {
            nombre, curp, telefono, edad, empresa, vacante, fecha: new Date().toISOString()
        });

        // B. Abrir WhatsApp
        const mensaje = `*NUEVA POSTULACIÓN*%0A%0A• *Nombre:* ${nombre}%0A• *CURP:* ${curp}%0A• *Empresa:* ${empresa}%0A• *Vacante:* ${vacante}`;
        window.open(`https://api.whatsapp.com/send?phone=526461974763&text=${mensaje}`, '_blank');
    };

    // [El resto de tu lógica de carga de empresas y vacantes (onValue) y UI se mantiene igual aquí debajo...]
    // (Ya tienes esto en tu código, simplemente asegúrate de mantenerlo dentro de este script)
</script>
</body>
</html>
