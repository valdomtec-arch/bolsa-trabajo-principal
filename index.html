<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolsa de Trabajo - Súmate a Nuestro Equipo</title>
    <style>
        :root {
            --primary-orange: #ff6600;
            --secondary-blue: #0f2a4a;
            --light-bg: #f4f7f6;
            --white: #ffffff;
            --green-whatsapp: #25D366;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--light-bg);
            color: #333;
            line-height: 1.6;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: var(--white);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 3px solid var(--primary-orange);
            padding-bottom: 20px;
        }

        header h1 {
            color: var(--secondary-blue);
            font-size: 2rem;
            text-transform: uppercase;
        }

        header p {
            color: var(--primary-orange);
            font-weight: bold;
            font-size: 1.2rem;
        }

        /* --- NUEVA SECCIÓN: GALERÍA DE IMÁGENES --- */
        .gallery-section {
            margin-bottom: 35px;
        }

        .gallery-section h2 {
            color: var(--secondary-blue);
            font-size: 1.3rem;
            margin-bottom: 15px;
            text-align: center;
        }

        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .image-card {
            background: #fff;
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
            border: 1px solid #e1e1e1;
            text-align: center;
        }

        .image-card img {
            max-width: 100%;
            height: auto;
            border-radius: 6px;
            display: block;
            margin: 0 auto 10px auto;
        }

        .image-card span {
            font-size: 0.9rem;
            font-weight: bold;
            color: var(--secondary-blue);
        }

        /* Sección de Botones de Enlace */
        .links-section {
            margin-bottom: 35px;
        }

        .links-section h2 {
            color: var(--secondary-blue);
            font-size: 1.3rem;
            margin-bottom: 15px;
            text-align: center;
        }

        .button-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .btn-link {
            display: block;
            text-align: center;
            background-color: var(--secondary-blue);
            color: var(--white);
            padding: 12px 20px;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            transition: background 0.3s ease;
        }

        .btn-link:hover {
            background-color: var(--primary-orange);
        }

        /* Formulario */
        .form-section {
            background: #f9f9f9;
            padding: 25px;
            border-radius: 8px;
            border: 1px solid #e1e1e1;
        }

        .form-section h2 {
            color: var(--secondary-blue);
            margin-bottom: 20px;
            font-size: 1.4rem;
            text-align: center;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #555;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 1rem;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--primary-orange);
        }

        .btn-whatsapp {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            background-color: var(--green-whatsapp);
            color: white;
            border: none;
            padding: 14px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.3s ease;
        }

        .btn-whatsapp:hover {
            background-color: #1eaf52;
        }

        .btn-whatsapp svg {
            margin-right: 10px;
            fill: white;
            width: 24px;
            height: 24px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>¡Súmate a nuestro equipo!</h1>
        <p>Tu talento hace la diferencia</p>
    </header>

    <section class="gallery-section">
        <h2>Ofertas de Empleo Disponibles</h2>
        <div class="image-grid">
            
            <div class="image-card">
                <img src="imagen-soriana.jpg" alt="Vacantes Soriana Tlaquepaque">
                <span>Soriana Tlaquepaque</span>
            </div>

            <div class="image-card">
                <img src="imagen-topband.jpg" alt="Vacantes Top Band">
                <span>Top Band</span>
            </div>

            <div class="image-card">
                <img src="imagen-fimex.jpg" alt="Vacantes FIMEX">
                <span>FIMEX</span>
            </div>

        </div>
    </section>

    <section class="links-section">
        <h2>Visita nuestras Bolsas de Trabajo Oficiales</h2>
        <div class="button-group">
            <a href="https://valdomtec-arch.github.io/bolsa-trabajo-topband/" target="_blank" class="btn-link">Top Band</a>
            <a href="https://valdomtec-arch.github.io/bolsa-trabajo-soriana-tlaquepaque/" target="_blank" class="btn-link">Soriana Tlaquepaque</a>
            <a href="https://valdomtec-arch.github.io/bolsa-trabajo-fimex/" target="_blank" class="btn-link">FIMEX</a>
        </div>
    </section>

    <section class="form-section">
        <h2>Registro de Candidato</h2>
        <form id="jobForm">
            <div class="form-group">
                <label for="nombre">Nombre y Apellido:</label>
                <input type="text" id="nombre" required placeholder="Ej. Juan Pérez">
            </div>

            <div class="form-group">
                <label for="curp">CURP:</label>
                <input type="text" id="curp" required maxlength="18" placeholder="Ingresa tu CURP" style="text-transform: uppercase;">
            </div>

            <div class="form-group">
                <label for="telefono">Teléfono:</label>
                <input type="tel" id="telefono" required placeholder="Ej. 3312345678">
            </div>

            <div class="form-group">
                <label for="edad">Edad:</label>
                <input type="number" id="edad" required min="18" max="65" placeholder="Ej. 25">
            </div>

            <div class="form-group">
                <label for="empresa">Empresa de Interés:</label>
                <select id="empresa" required>
                    <option value="">Selecciona una empresa</option>
                    <option value="Top Band">Top Band</option>
                    <option value="Soriana Tlaquepaque">Soriana Tlaquepaque</option>
                    <option value="FIMEX">FIMEX</option>
                </select>
            </div>

            <div class="form-group">
                <label for="vacante">Vacante a la que postula:</label>
                <input type="text" id="vacante" required placeholder="Ej. Maniobrista / Ayudante General">
            </div>

            <button type="button" class="btn-whatsapp" onclick="enviarWhatsApp()">
                <svg viewBox="0 0 24 24">
                    <path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946C.06 5.348 5.397.01 12.008.01c3.202.001 6.212 1.246 8.477 3.513 2.266 2.268 3.507 5.28 3.505 8.484-.004 6.657-5.34 11.997-11.953 11.997-2.005-.001-3.973-.502-5.713-1.457L0 24zm6.59-4.846c1.6.95 3.188 1.449 4.825 1.451 5.436 0 9.86-4.37 9.864-9.799.002-2.63-1.023-5.101-2.885-6.963C16.528 1.881 14.058.86 11.43.86c-5.436 0-9.86 4.37-9.864 9.8 0 1.742.491 3.442 1.42 4.978l-.992 3.624 3.71-.973zm15.423-7.442c-.29-.146-1.72-.849-1.986-.946-.266-.097-.46-.146-.653.146-.193.291-.747.946-.917 1.14-.17.194-.34.218-.63.073-.29-.146-1.227-.452-2.337-1.443-.864-.771-1.447-1.723-1.617-2.015-.17-.29-.018-.448.127-.592.13-.13.29-.34.436-.509.145-.17.193-.291.29-.485.097-.194.049-.364-.025-.509-.073-.146-.653-1.576-.893-2.152-.233-.562-.471-.485-.653-.494-.17-.009-.364-.01-.557-.01-.193 0-.508.073-.774.364-.266.291-1.015.994-1.015 2.424s1.039 2.812 1.184 3.006c.145.194 2.041 3.116 4.945 4.372.69.299 1.229.478 1.649.612.693.221 1.324.19 1.822.115.556-.083 1.72-.703 1.962-1.383.243-.68.243-1.261.17-1.383-.073-.122-.266-.194-.556-.34z"/>
                </svg>
                Enviar Postulación por WhatsApp
            </button>
        </form>
    </section>
</div>

<script>
    function enviarWhatsApp() {
        const telefonoReclutador = "526461974763"; 

        const nombre = document.getElementById('nombre').value.trim();
        const curp = document.getElementById('curp').value.trim().toUpperCase();
        const telefono = document.getElementById('telefono').value.trim();
        const edad = document.getElementById('edad').value.trim();
        const empresa = document.getElementById('empresa').value;
        const vacante = document.getElementById('vacante').value.trim();

        if (!nombre || !curp || !telefono || !edad || !empresa || !vacante) {
            alert("Por favor, complete todos los campos antes de enviar.");
            return;
        }

        const mensaje = `*NUEVA POSTULACIÓN*%0A%0A` +
                        `• *Nombre y Apellido:* ${nombre}%0A` +
                        `• *CURP:* ${curp}%0A` +
                        `• *Teléfono:* ${telefono}%0A` +
                        `• *Edad:* ${edad} años%0A` +
                        `• *Empresa:* ${empresa}%0A` +
                        `• *Vacante:* ${vacante}`;

        const urlWhatsApp = `https://api.whatsapp.com/send?phone=${telefonoReclutador}&text=${mensaje}`;
        window.open(urlWhatsApp, '_blank');
    }
</script>

</body>
</html>
