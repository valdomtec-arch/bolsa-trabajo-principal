<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control Centralizado - Bolsa de Trabajo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-orange: #ff6600;
            --secondary-blue: #0f2a4a;
            --bg-page: #050b14;          
            --container-bg: #111e30;     
            --card-bg: #18273c;          
            --white: #ffffff;
            --text-light: #f1f5f9;       
            --text-muted: #94a3b8;       
            --border-color: #243854;     
            --green-whatsapp: #25D366;
            --purple-ia: #8b5cf6;
            --green-success: #10b981;
        }
        body {
            background-color: var(--bg-page);
            color: var(--text-light);
            font-family: 'Segoe UI', system-ui, sans-serif;
            padding: 30px 10px;
            margin: 0;
        }
        .admin-container {
            max-width: 1100px;
            margin: 0 auto;
            background: var(--container-bg);
            padding: 30px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
        }
        h1 { color: var(--white); text-align: center; margin-bottom: 25px; }
        
        .tabs-menu {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
        }
        .tab-btn {
            background: #0d1724;
            color: var(--text-muted);
            border: 1px solid var(--border-color);
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.95rem;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .tab-btn:hover { color: var(--white); border-color: var(--primary-orange); }
        .tab-btn.active {
            background: var(--primary-orange);
            color: white;
            border-color: var(--primary-orange);
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .form-admin {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            margin-bottom: 30px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
        }
        .form-group { display: flex; flex-direction: column; }
        .form-group label { margin-bottom: 6px; font-weight: 600; font-size: 0.9rem; }
        .form-group input, .form-group select, .form-group textarea {
            padding: 11px;
            background: #1d2e47;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: white;
            font-size: 0.95rem;
        }
        .form-group textarea { resize: vertical; min-height: 80px; font-family: inherit; }
        .full-width { grid-column: 1 / -1; }
        
        .btn-add {
            background: var(--primary-orange);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            grid-column: 1 / -1;
            transition: 0.3s;
            font-size: 1rem;
        }
        .btn-add:hover { background: #e05500; }

        .ia-box {
            background: rgba(139, 92, 246, 0.1);
            border: 1px dashed var(--purple-ia);
            padding: 20px;
            border-radius: 12px;
            grid-column: 1 / -1;
            margin-bottom: 10px;
        }
        .btn-ia {
            background: var(--purple-ia);
            color: white; border: none; padding: 10px 20px; font-weight: 700;
            border-radius: 6px; cursor: pointer; transition: 0.3s; margin-top: 10px;
        }
        .btn-ia:hover { background: #7c3aed; }
        
        .file-input-wrapper {
            position: relative;
            display: inline-block;
            margin-top: 5px;
        }
        .file-input-wrapper input[type="file"] {
            position: absolute;
            left: 0; top: 0; opacity: 0;
            width: 100%; height: 100%;
            cursor: pointer;
        }
        .btn-file-custom {
            background: #0284c7; color: white; padding: 10px 20px;
            font-weight: 700; border-radius: 6px; display: inline-block; transition: 0.3s;
        }
        .btn-file-custom:hover { background: #0369a1; }

        .section-divider {
            grid-column: 1 / -1;
            border-bottom: 1px dashed var(--border-color);
            padding-bottom: 5px;
            margin-top: 5px;
            color: var(--primary-orange);
            font-size: 0.95rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .empresas-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        .empresas-table th, .empresas-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }
        .empresas-table th { background-color: #0d1724; color: var(--primary-orange); }
        .empresas-table td img { width: 45px; height: auto; border-radius: 4px; background: white; padding: 2px;}
        
        .btn-delete {
            background: #dc2626; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer;
        }
        .btn-delete:hover { background: #b91c1c; }
        
        .selector-puestos-verde {
            background: #112d24;
            border: 1px solid var(--green-success);
            color: #34d399;
            padding: 12px;
            border-radius: 6px;
            width: 100%;
            font-weight: bold;
            margin-bottom: 12px;
            font-size: 1rem;
        }
    </style>
</head>
<body>

<div class="admin-container">
    <h1><i class="fas fa-sliders-h"></i> Panel de Administración Global</h1>
    
    <div class="tabs-menu">
        <button class="tab-btn active" id="btnTab1"><i class="fas fa-building"></i> 1. Registrar Empresa</button>
        <button class="tab-btn" id="btnTab2"><i class="fas fa-briefcase"></i> 2. Control de Vacantes Masivo</button>
    </div>

    <div id="tabPrincipal" class="tab-content active">
        <div class="form-admin">
            <div class="section-divider">Alta / Edición de Empresa Base</div>
            <div class="form-group">
                <label>ID de la Empresa:</label>
                <input type="text" id="admId" placeholder="Ej: katcon, taehwa, soriana">
            </div>
            <div class="form-group">
                <label>Nombre Comercial General:</label>
                <input type="text" id="admNombre" placeholder="Ej: Katcon S.A.">
            </div>
            <div class="form-group">
                <label>Ubicación Base:</label>
                <input type="text" id="admUbicacion" placeholder="Ej: Jalisco - Tlaquepaque">
            </div>
            <div class="form-group full-width">
                <label>Hipervínculo Base del Repositorio:</label>
                <input type="text" id="admLink" placeholder="URL completa...">
            </div>
            <div class="form-group">
                <label>URL del Logo de la Empresa:</label>
                <input type="text" id="admImagen" placeholder="logo.jpg">
            </div>
            <div class="form-group">
                <label>Tags:</label>
                <input type="text" id="admTags" placeholder="Tags...">
            </div>
            <button class="btn-add" onclick="agregarEmpresaPrincipal()"><i class="fas fa-save"></i> Guardar Empresa</button>
        </div>

        <h2>Directorio de Empresas</h2>
        <div style="overflow-x: auto;">
            <table class="empresas-table">
                <thead>
                    <tr>
                        <th>Logo</th>
                        <th>ID Clave</th>
                        <th>Empresa Base</th>
                        <th>Ubicación</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="adminTablaEmpresas"></tbody>
            </table>
        </div>
    </div>

    <div id="tabSecundarias" class="tab-content">
        <div class="form-admin">
            <div class="section-divider">Configuración de Destino</div>
            <div class="form-group">
                <label>Selecciona la Empresa:</label>
                <select id="secEmpresaSelect" onchange="actualizarSelectorVacantes()">
                    <option value="">-- Elige una Empresa --</option>
                </select>
            </div>
            <div class="form-group">
                <label>ID Clave de este Puesto:</label>
                <input type="text" id="secPuestoId" placeholder="Ej: ayudante, montacargas">
            </div>

            <div class="ia-box">
                <label style="color: var(--purple-ia); font-weight: bold; display: block; margin-bottom: 5px;">
                    <i class="fas fa-bolt"></i> Extractor de Patrones de WhatsApp V3.3 (Salarios de Precisión Multi-Monto)
                </label>
                
                <div style="display: flex; gap: 15px; align-items: center; margin-bottom: 15px; flex-wrap: wrap;">
                    <div class="file-input-wrapper">
                        <div class="btn-file-custom"><i class="fas fa-folder-open"></i> 1. Cargar Archivo .txt</div>
                        <input type="file" id="archivoTxtInput" accept=".txt" onchange="procesarTxtWhatsAppV3()">
                    </div>
                    <span id="nombreArchivoCargado" style="font-size: 0.9rem; color: var(--primary-orange); font-weight: bold;">Ningún archivo seleccionado</span>
                </div>

                <div id="contenedorResultadoVerde" style="margin-bottom: 15px; display: none;">
                    <label style="color: var(--green-success); font-weight: bold; display: block; margin-bottom: 5px; font-size: 0.9rem;">
                        <i class="fas fa-list-ol"></i> Selecciona la vacante para auto-rellenar:
                    </label>
                    
                    <select id="selectorVacantesDetectadas" class="selector-puestos-verde" onchange="cambiarVacanteVerdeSeleccionada()">
                        </select>

                    <textarea id="codigoJsonVerde" readonly style="background: #061c15; color: #34d399; border: 1px solid var(--green-success); font-family: monospace; font-size: 0.85rem; width: 100%; min-height: 150px; margin-bottom: 10px; padding: 10px; box-sizing: border-box; border-radius: 8px;"></textarea>
                    
                    <button type="button" class="btn-ia" onclick="transferirAlEspacioMorado()" style="background: var(--green-success); width: 100%; margin-top:0;">
                        <i class="fas fa-arrow-alt-circle-down"></i> 2. Transferir al Espacio Morado
                    </button>
                </div>

                <textarea id="iaTextoPegar" placeholder="El código aparecerá aquí..." style="border-color: var(--purple-ia); min-height: 80px; margin-top: 15px;"></textarea>
                <button type="button" class="btn-ia" onclick="procesarTextoBrutoTxt()">
                    <i class="fas fa-magic"></i> 3. Rellenar Formulario Automáticamente
                </button>
            </div>

            <div class="section-divider">Datos del Puesto</div>
            <div class="form-group">
                <label>Estatus:</label>
                <select id="secEstatus">
                    <option value="disponible">✅ Activa</option>
                    <option value="no_disponible">❌ Pausada</option>
                </select>
            </div>
            <div class="form-group">
                <label>Nombre Oficial de la Vacante:</label>
                <input type="text" id="secVacanteNombre">
            </div>
            <div class="form-group">
                <label>Salario Neto Ofrecido:</label>
                <input type="text" id="secSalario">
            </div>
            <div class="form-group">
                <label>Rango de Edad Requerido:</label>
                <input type="text" id="secEdad">
            </div>
            <div class="form-group">
                <label>Zonas de Reclutamiento / Ubicación:</label>
                <input type="text" id="secLugarOrigen">
            </div>
            <div class="form-group">
                <label>Turnos y Horarios:</label>
                <input type="text" id="secTurnos">
            </div>
            <div class="form-group">
                <label>Sexo Preferente:</label>
                <select id="secSexo">
                    <option value="Indistinto">Indistinto</option>
                    <option value="Masculino">Masculino</option>
                    <option value="Femenino">Femenino</option>
                </select>
            </div>
            <div class="form-group">
                <label>Experiencia Mínima:</label>
                <input type="text" id="secExperiencia">
            </div>
            <div class="form-group">
                <label>Escolaridad Mínima:</label>
                <input type="text" id="secEscolaridad">
            </div>
            <div class="form-group">
                <label>URL Banner (Opcional):</label>
                <input type="text" id="secBannerUrl">
            </div>
            <div class="form-group full-width">
                <label>Actividades y Beneficios:</label>
                <textarea id="secActividades"></textarea>
            </div>

            <button class="btn-add" onclick="guardarDetallesSecundaria()"><i class="fas fa-cloud-upload-alt"></i> Sincronizar Vacante en Firebase</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = { databaseURL: "https://bolsa-de-trabajo-a52e4-default-rtdb.firebaseio.com/" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let vacantesProcesadasGlobal = [];

    document.getElementById('btnTab1').addEventListener('click', () => {
        document.getElementById('tabPrincipal').classList.add('active');
        document.getElementById('tabSecundarias').classList.remove('active');
        document.getElementById('btnTab1').classList.add('active');
        document.getElementById('btnTab2').classList.remove('active');
    });
    document.getElementById('btnTab2').addEventListener('click', () => {
        document.getElementById('tabSecundarias').classList.add('active');
        document.getElementById('tabPrincipal').classList.remove('active');
        document.getElementById('btnTab2').classList.add('active');
        document.getElementById('btnTab1').classList.remove('active');
    });

    window.procesarTxtWhatsAppV3 = function() {
        try {
            const input = document.getElementById('archivoTxtInput');
            const indicadorNombre = document.getElementById('nombreArchivoCargado');
            const contenedorVerde = document.getElementById('contenedorResultadoVerde');
            const selectorPuestos = document.getElementById('selectorVacantesDetectadas');
            
            if (!input.files || input.files.length === 0) return;
            
            const archivo = input.files[0];
            indicadorNombre.innerText = `📄 ${archivo.name}`;
            
            const lector = new FileReader();
            lector.onload = function(e) {
                try {
                    const cuerpoTexto = e.target.result;
                    const lineas = cuerpoTexto.split('\n')
                                             .map(l => l.trim().replace(/\s+/g, ' '))
                                             .filter(l => l !== "");
                    
                    // --- ALGORITMO DE UBICACIÓN ---
                    let zonaDetectada = "Zona Industrial"; 
                    for (let i = 0; i < lineas.length; i++) {
                        let lLower = lineas[i].toLowerCase();
                        if (lLower.includes("parque") || lLower.includes("ciénega") || lLower.includes("cienega") || lLower.includes("📍") || lLower.includes("municipio") || lLower.includes("pesquería") || lLower.includes("tlaquepaque") || lLower.includes("el salto")) {
                            let limpia = lineas[i].replace(/[📍🏭🔰*•\-✅]/g, '').trim();
                            if (limpia.toLowerCase() === "empresa" && i + 1 < lineas.length) {
                                limpia = lineas[i+1].replace(/[📍🏭🔰*•\-✅]/g, '').trim();
                            }
                            if (limpia.length > 3) {
                                zonaDetectada = limpia;
                                break;
                            }
                        }
                    }

                    // --- HORARIOS Y BENEFICIOS ---
                    let horarioComun = "Turnos de trabajo descritos";
                    let beneficiosArray = [];
                    lineas.forEach(l => {
                        const lLower = l.toLowerCase();
                        if(lLower.includes("7:00") || lLower.includes("4x3") || lLower.includes("turno") || lLower.includes("rotativo") || lLower.includes("se rotan")) {
                            if(!lLower.includes("solicita") && !lLower.includes("ayudante")) {
                                horarioComun = l.replace(/[❇️‼️*•\-🔴]/g, '').trim();
                            }
                        }
                        if(lLower.includes("prestaciones") || lLower.includes("vales") || lLower.includes("comedor") || lLower.includes("bono") || lLower.includes("ahorro") || lLower.includes("seguro") || lLower.includes("aguinaldo") || lLower.includes("vacacional")) {
                            beneficiosArray.push(l.replace(/[💠✅*•\-☑️]/g, '').trim());
                        }
                    });

                    let puestosEncontrados = [];
                    let puestoActual = null;
                    const disparadoresPuesto = ["ayudante", "ayudantes", "montacarguista", "tecnico", "técnico", "inspector", "calidad", "operador", "guardia", "auxiliar", "limpieza", "almacenista"];

                    // --- BARRIDO DE PUESTOS Y SALARIOS DE ALTA PRECISIÓN ---
                    lineas.forEach((linea) => {
                        const lLower = linea.toLowerCase();
                        let esLineaDePuesto = disparadoresPuesto.some(p => lLower.includes(p)) && 
                                              (lLower.includes("🔰") || lLower.includes("*") || lLower.includes("solicita") || lLower.includes("$") || lLower.includes("hombres"));

                        if (esLineaDePuesto) {
                            if (puestoActual) puestosEncontrados.push(puestoActual);

                            let nombreLimpio = linea.replace(/[🔰*Solicita:👷🏻‍♂️👨🏻‍🔧👷🏻‍♀️()•\-]/g, '').split('$')[0].split('(')[0].trim();
                            
                            puestoActual = {
                                vacanteNombre: nombreLimpio.toUpperCase(),
                                salario: "A convenir / Ver detalles", // Inicializador seguro
                                edad: "18 a 55 años",
                                lugarOrigen: zonaDetectada,
                                turnos: horarioComun,
                                sexo: "Indistinto",
                                experiencia: "No necesaria / Según puesto",
                                escolaridad: "Primaria / Secundaria Mínima"
                            };

                            if (lLower.includes("hombres y mujeres") || lLower.includes("ambos sexos")) puestoActual.sexo = "Indistinto";
                            else if (lLower.includes("hombre") || lLower.includes("solo hombres")) puestoActual.sexo = "Masculino";
                            else if (lLower.includes("femenino") || lLower.includes("mujer")) puestoActual.sexo = "Femenino";
                        }

                        if (puestoActual) {
                            // NUEVO CAPTURADOR INTELIGENTE DE LÍNEA DE SALARIO
                            if (lLower.includes("$") || lLower.includes("salario diario") || lLower.includes("sueldo")) {
                                // Si la línea contiene el signo monetario, guardamos la frase íntegra para no alterar los montos diarios/semanales
                                let lineaLimpiaSueldo = linea.replace(/[💲🔰*•\-]/g, '').trim();
                                if(lineaLimpiaSueldo.length > 2) {
                                    puestoActual.salario = lineaLimpiaSueldo;
                                }
                            }
                            
                            if (lLower.includes("edad") || lLower.includes("años") || lLower.includes("rango")) {
                                const numeros = lLower.match(/[0-9]+\s*(a|to|-)\s*[0-9]+/);
                                if (numeros) puestoActual.edad = numeros[0] + " años";
                            }
                            if (lLower.includes("hombres y mujeres") || lLower.includes("ambos sexos")) puestoActual.sexo = "Indistinto";
                            else if (lLower.includes("hombre") || lLower.includes("masculino")) puestoActual.sexo = "Masculino";
                            else if (lLower.includes("femenino") || lLower.includes("mujer")) puestoActual.sexo = "Femenino";
                            
                            if (lLower.includes("preparatoria") || lLower.includes("prepa") || lLower.includes("técnica")) {
                                puestoActual.escolaridad = "Preparatoria Técnica Mínima";
                            } else if (lLower.includes("secundaria")) {
                                puestoActual.escolaridad = "Secundaria Mínima";
                            } else if (lLower.includes("primaria")) {
                                puestoActual.escolaridad = "Primaria Mínima";
                            }
                            
                            if (lLower.includes("experiencia") || lLower.includes("licencia") || lLower.includes("dc3") || lLower.includes("herramientas")) {
                                puestoActual.experiencia = linea.replace(/[-•*]/g, '').trim();
                            }
                        }
                    });

                    if (puestoActual) puestosEncontrados.push(puestoActual);

                    if (puestosEncontrados.length === 0) {
                        puestosEncontrados.push({
                            vacanteNombre: "AYUDANTE GENERAL",
                            salario: "Salario según tabulador",
                            edad: "18 a 55 años",
                            lugarOrigen: zonaDetectada,
                            turnos: horarioComun,
                            sexo: "Indistinto",
                            experiencia: "No necesaria",
                            escolaridad: "Primaria Mínima"
                        });
                    }

                    const textoBeneficiosUnificados = beneficiosArray.slice(0, 15).join(" / ") || "Prestaciones Superiores / Comedor / Transporte";
                    puestosEncontrados.forEach(p => {
                        p.actividades = textoBeneficiosUnificados;
                    });

                    vacantesProcesadasGlobal = puestosEncontrados;
                    selectorPuestos.innerHTML = "";
                    
                    vacantesProcesadasGlobal.forEach((vac, index) => {
                        selectorPuestos.innerHTML += `<option value="${index}">📌 Puesto: ${vac.vacanteNombre}</option>`;
                    });

                    cambiarVacanteVerdeSeleccionada();
                    contenedorVerde.style.display = 'block';

                } catch (errInner) {
                    alert("Error parseando bloques de salario: " + errInner.message);
                }
            };
            lector.readAsText(archivo);
        } catch (errOuter) {
            alert("Error general: " + errOuter.message);
        }
    }

    window.cambiarVacanteVerdeSeleccionada = function() {
        const index = document.getElementById('selectorVacantesDetectadas').value;
        const cuadroVerde = document.getElementById('codigoJsonVerde');
        if(vacantesProcesadasGlobal[index]) {
            cuadroVerde.value = JSON.stringify(vacantesProcesadasGlobal[index], null, 2);
        }
    }

    window.transferirAlEspacioMorado = function() {
        const codigoVerde = document.getElementById('codigoJsonVerde').value.trim();
        if(!codigoVerde) return;
        document.getElementById('iaTextoPegar').value = codigoVerde;
        alert("📥 Datos de plaza listos para inyección.");
    }

    window.procesarTextoBrutoTxt = function() {
        const textoRaw = document.getElementById('iaTextoPegar').value.trim();
        if(!textoRaw) return;
        try {
            const data = JSON.parse(textoRaw);
            inyectarCamposEnFormulario(data);
            
            const idSugerido = data.vacanteNombre.toLowerCase().split(' ')[0].normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-z0-9]/g, "");
            document.getElementById('secPuestoId').value = idSugerido;
            alert("✨ ¡Formulario sincronizado localmente!");
        } catch(e) {
            alert("Estructura JSON inválida.");
        }
    }

    function inyectarCamposEnFormulario(data) {
        document.getElementById('secVacanteNombre').value = data.vacanteNombre || '';
        document.getElementById('secEdad').value = data.edad || '';
        document.getElementById('secSalario').value = data.salario || '';
        document.getElementById('secLugarOrigen').value = data.lugarOrigen || '';
        document.getElementById('secTurnos').value = data.turnos || '';
        document.getElementById('secExperiencia').value = data.experiencia || '';
        document.getElementById('secEscolaridad').value = data.escolaridad || '';
        document.getElementById('secActividades').value = data.actividades || '';
        document.getElementById('secBannerUrl').value = data.bannerUrl || '';
        document.getElementById('secSexo').value = data.sexo || 'Indistinto';
    }

    // --- FIREBASE INTEGRATION ---
    window.agregarEmpresaPrincipal = function() {
        const id = document.getElementById('admId').value.trim().toLowerCase();
        const nombre = document.getElementById('admNombre').value.trim();
        const ubicacion = document.getElementById('admUbicacion').value.trim();
        const link = document.getElementById('admLink').value.trim();
        const imagen = document.getElementById('admImagen').value.trim();
        const tags = document.getElementById('admTags').value.trim();

        if(!id || !nombre || !ubicacion || !link || !imagen) return;

        set(ref(db, 'empresas/' + id), { id, nombre, ubicacion, link, imagen, tags }).then(() => {
            alert("Empresa guardada.");
            limpiarFormularioPrincipal();
        });
    }

    onValue(ref(db, 'empresas'), (snapshot) => {
        const tbody = document.getElementById('adminTablaEmpresas');
        const select = document.getElementById('secEmpresaSelect');
        tbody.innerHTML = '';
        select.innerHTML = '<option value="">-- Selecciona una Empresa --</option>';
        const data = snapshot.val();
        if(data) {
            Object.keys(data).forEach(key => {
                const emp = data[key];
                tbody.innerHTML += `
                    <tr>
                        <td><img src="${emp.imagen}" onerror="this.src='https://placehold.co/100'"></td>
                        <td><code>/${emp.id}</code></td>
                        <td><strong>${emp.nombre}</strong></td>
                        <td>${emp.ubicacion}</td>
                        <td>
                            <button class="btn-delete">Borrar</button>
                        </td>
                    </tr>`;
                select.innerHTML += `<option value="${emp.id}">${emp.nombre}</option>`;
            });
        }
    });

    window.actualizarSelectorVacantes = function() {
        document.getElementById('secPuestoId').value = '';
        limpiarFormularioSecundario();
    }

    window.guardarDetallesSecundaria = function() {
        const empresaId = document.getElementById('secEmpresaSelect').value;
        const puestoId = document.getElementById('secPuestoId').value.trim().toLowerCase();
        if(!empresaId || !puestoId) return;

        set(ref(db, `vacantes_detalles/${empresaId}/${puestoId}`), {
            puestoId,
            estatus: document.getElementById('secEstatus').value,
            vacanteNombre: document.getElementById('secVacanteNombre').value,
            salario: document.getElementById('secSalario').value,
            edad: document.getElementById('secEdad').value,
            lugarOrigen: document.getElementById('secLugarOrigen').value,
            turnos: document.getElementById('secTurnos').value,
            sexo: document.getElementById('secSexo').value,
            experiencia: document.getElementById('secExperiencia').value,
            escolaridad: document.getElementById('secEscolaridad').value,
            bannerUrl: document.getElementById('secBannerUrl').value,
            actividades: document.getElementById('secActividades').value
        }).then(() => {
            alert("¡Vacante sincronizada con Firebase!");
        });
    }

    function limpiarFormularioPrincipal() {
        document.getElementById('admId').value = ''; document.getElementById('admNombre').value = '';
        document.getElementById('admUbicacion').value = ''; document.getElementById('admLink').value = '';
        document.getElementById('admImagen').value = ''; document.getElementById('admTags').value = '';
    }

    function limpiarFormularioSecundario() {
        document.getElementById('secVacanteNombre').value = ''; document.getElementById('secSalario').value = ''; 
        document.getElementById('secEdad').value = ''; document.getElementById('secLugarOrigen').value = ''; 
        document.getElementById('secTurnos').value = ''; document.getElementById('secExperiencia').value = '';
        document.getElementById('secEscolaridad').value = ''; document.getElementById('secActividades').value = '';
    }
</script>
</body>
</html>
