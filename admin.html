<!DOCTYPE html> 
<html lang="es"> 
<head> 
<meta charset="UTF-8"> 
<meta name="viewport" content="width=device-width, initial-scale=1.0"> 
<title>Panel de Control Centralizado - Bolsa de Trabajo</title> 
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"> 
<style> 
:root { 
--primary-orange: #ff6600; 
--secondary-blue: #0f2a4a; 
--bg-page: #050b14; 
--container-bg: #111e30; 
--card-bg: #18273c; 
--white: #ffffff; 
--text-light: #f1f5f9; 
--text-muted: #94a3b8; 
--border-color: #243854; 
--green-whatsapp: #25D366; 
--purple-ia: #8b5cf6; 
--green-success: #10b981; 
--red-danger: #ef4444; 
--blue-update: #0284c7; 
} 
* { box-sizing: border-box; }
body { background-color: var(--bg-page); color: var(--text-light); font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; padding: 20px 10px; margin: 0; line-height: 1.5; } 
.admin-container { max-width: 1200px; margin: 0 auto; background: var(--container-bg); padding: 25px; border-radius: 16px; border: 1px solid var(--border-color); box-shadow: 0 10px 40px rgba(0,0,0,.4); } 
h1 { color: var(--white); text-align: center; margin-bottom: 25px; font-size: 1.6rem; } 
.tabs-menu { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 25px; border-bottom: 2px solid var(--border-color); padding-bottom: 10px; } 
.tab-btn { background: #0d1724; color: var(--text-muted); border: 1px solid var(--border-color); padding: 10px 16px; border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 0.9rem; transition: all .25s ease; display: flex; align-items: center; gap: 8px; flex: 1 1 auto; justify-content: center; } 
.tab-btn:hover { color: var(--white); border-color: var(--primary-orange); transform: translateY(-1px); } 
.tab-btn.active { background: var(--primary-orange); color: white; border-color: var(--primary-orange); } 
.tab-content { display: none; animation: fade .3s ease; } 
.tab-content.active { display: block; } 
@keyframes fade { from{opacity:0; transform: translateY(6px);} to{opacity:1; transform:none;} }
.form-admin { background: var(--card-bg); padding: 22px; border-radius: 12px; border: 1px solid var(--border-color); margin-bottom: 25px; display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 16px; } 
.form-group { display: flex; flex-direction: column; } 
.form-group label { margin-bottom: 5px; font-weight: 600; font-size: 0.88rem; color: var(--text-light); } 
.form-group input, .form-group select, .form-group textarea { padding: 10px 12px; background: #1d2e47; border: 1px solid var(--border-color); border-radius: 8px; color: white; font-size: 0.92rem; outline: none; transition: border .2s; }
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--primary-orange); }
.form-group textarea { resize: vertical; min-height: 80px; font-family: inherit; } 
.full-width { grid-column: 1 / -1; } 
button { font-family: inherit; }
.btn-add { background: var(--primary-orange); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: 700; cursor: pointer; transition: all .25s; font-size: 1rem; grid-column: 1 / -1; }
.btn-add:hover { background: #e05500; transform: translateY(-1px); } 
.btn-update-final { background: var(--blue-update); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: 700; cursor: pointer; transition: all .25s; font-size: 1rem; } 
.dual-buttons-layout { grid-column: 1 / -1; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 8px; } 
.ia-box { background: rgba(139, 92, 246, 0.1); border: 1px dashed var(--purple-ia); padding: 16px; border-radius: 12px; grid-column: 1 / -1; margin-bottom: 6px; }
.btn-edit-mode { background: #f59e0b; color: #111; border: none; padding: 10px 16px; font-weight: 700; border-radius: 6px; cursor: pointer; transition: all .25s; display: flex; align-items: center; gap: 6px; } 
.btn-delete-mode { background: var(--red-danger); color: white; border: none; padding: 10px 16px; font-weight: 700; border-radius: 6px; cursor: pointer; transition: all .25s; display: flex; align-items: center; gap: 6px; } 
.empresas-table { width: 100%; border-collapse: collapse; margin-top: 12px; font-size:.9rem; } 
.empresas-table th, .empresas-table td { padding: 10px; text-align: left; border-bottom: 1px solid var(--border-color); } 
.empresas-table th { background-color: #0d1724; color: var(--primary-orange); } 
.empresas-table td img { width: 42px; height: 42px; object-fit: contain; border-radius: 4px; background: white; padding: 2px;} 
</style> 
</head> 
<body> 
<div class="admin-container"> 
<h1><i class="fas fa-sliders-h"></i> Panel de Administración Global</h1> 

<div class="tabs-menu"> 
<button class="tab-btn active" data-tab="tabPrincipal"><i class="fas fa-building"></i> 1. Registrar Empresa</button> 
<button class="tab-btn" data-tab="tabSecundarias"><i class="fas fa-briefcase"></i> 2. Control de Vacantes</button>
<button class="tab-btn" data-tab="tabRegistros"><i class="fas fa-users"></i> 3. Registros y Estadísticas</button>
</div> 

<div id="tabPrincipal" class="tab-content active"> 
  <div class="form-admin"> 
    <div class="section-divider" style="grid-column: 1 / -1; font-weight:bold; color:var(--primary-orange);">Alta / Edición de Empresa Base</div> 
    <div class="form-group"><label>ID de la Empresa:</label><input type="text" id="admId" placeholder="Ej: katcon" maxlength="40"></div> 
    <div class="form-group"><label>Nombre Comercial:</label><input type="text" id="admNombre" placeholder="Ej: Katcon S.A."></div> 
    <div class="form-group"><label>Ubicación Base:</label><input type="text" id="admUbicacion" placeholder="Ej: Jalisco"></div> 
    <div class="form-group full-width"><label>Hipervínculo:</label><input type="url" id="admLink" placeholder="https://..."></div> 
    <div class="form-group"><label>URL Logo:</label><input type="url" id="admImagen" placeholder="https://...logo.png"></div> 
    <div class="form-group"><label>Etiquetas:</label><input type="text" id="admTags" placeholder="automotriz, 24h"></div>
    
    <div class="dual-buttons-layout" style="grid-template-columns: repeat(3, 1fr);">
        <button class="btn-add" onclick="agregarEmpresaPrincipal()"><i class="fas fa-save"></i> Guardar</button>
        <button class="btn-edit-mode" style="background:#64748b; justify-content:center;" onclick="limpiarFormularioEmpresas()"><i class="fas fa-eraser"></i> Limpiar</button>
        <button class="btn-delete-mode" style="justify-content:center;" onclick="eliminarEmpresaPorInput()"><i class="fas fa-trash-alt"></i> Borrar ID</button>
    </div>
  </div> 

  <h2 style="font-size:1.15rem;">Directorio de Empresas</h2> 
  <div style="overflow-x: auto;"> 
    <table class="empresas-table"> 
      <thead><tr><th>Logo</th><th>ID</th><th>Empresa</th><th>Ubicación</th><th>Acciones</th></tr></thead> 
      <tbody id="adminTablaEmpresas"></tbody> 
    </table> 
  </div> 
</div> 

<div id="tabSecundarias" class="tab-content"> </div>
<div id="tabRegistros" class="tab-content"> </div>

</div> 

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getDatabase, ref, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

const firebaseConfig = { databaseURL: "https://bolsa-de-trabajo-a52e4-default-rtdb.firebaseio.com/" };
const db = getDatabase(initializeApp(firebaseConfig));

// --- NUEVA VARIABLE GLOBAL PARA EDICIÓN ---
let empresasData = {};

// --- FUNCIONES DE ADMINISTRACIÓN DE EMPRESAS ---

window.limpiarFormularioEmpresas = function() {
  ['admId','admNombre','admUbicacion','admLink','admImagen','admTags'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('admId').disabled = false;
};

window.cargarEmpresaParaEditar = function(id) {
  const e = empresasData[id];
  if(!e) return;
  document.getElementById('admId').value = e.id;
  document.getElementById('admId').disabled = true; // Bloqueamos para no alterar el ID llave
  document.getElementById('admNombre').value = e.nombre;
  document.getElementById('admUbicacion').value = e.ubicacion || '';
  document.getElementById('admLink').value = e.link || '';
  document.getElementById('admImagen').value = e.imagen || '';
  document.getElementById('admTags').value = e.tags || '';
  window.scrollTo({ top: 0, behavior: 'smooth' });
};

window.eliminarEmpresa = async function(id) {
  if(confirm(`⚠️ ¿Seguro que deseas eliminar la empresa con ID: "${id}"?`)) {
    try {
      await remove(ref(db, `empresas/${id}`));
      alert('✅ Eliminada correctamente');
    } catch(e) { alert('❌ Error: ' + e.message); }
  }
};

window.eliminarEmpresaPorInput = async function() {
  const id = document.getElementById('admId').value.trim();
  if(!id) return alert('⚠️ Escribe el ID de la empresa en el formulario.');
  await eliminarEmpresa(id);
  limpiarFormularioEmpresas();
};

window.agregarEmpresaPrincipal = async function(){
  const id = sanitizarId(document.getElementById('admId').value);
  const nombre = document.getElementById('admNombre').value.trim();
  if(!id||!nombre) return alert('⚠️ ID y nombre obligatorios');
  const payload = {
    id, nombre,
    ubicacion: document.getElementById('admUbicacion').value.trim(),
    link: document.getElementById('admLink').value.trim(),
    imagen: document.getElementById('admImagen').value.trim(),
    tags: document.getElementById('admTags').value.trim(),
    actualizado: new Date().toISOString()
  };
  try{
    await set(ref(db,`empresas/${id}`), payload);
    alert('✅ Empresa guardada');
    limpiarFormularioEmpresas();
  }catch(e){ alert('❌ Error: '+e.message); }
};

// --- RENDERIZADO TABLA ---
onValue(ref(db,'empresas'), snap=>{
  const tb = document.getElementById('adminTablaEmpresas');
  tb.innerHTML='';
  empresasData = snap.val()||{};
  
  Object.values(empresasData).forEach(e=>{
    tb.innerHTML += `
      <tr>
        <td><img src="${e.imagen||'https://cdn-icons-png.flaticon.com/512/1041/1041916.png'}" alt=""></td>
        <td><code>${e.id}</code></td>
        <td>${e.nombre}</td>
        <td>${e.ubicacion||''}</td>
        <td>
           <div style="display:flex; gap:6px;">
             <button class="btn-edit-mode" style="padding:4px 8px;" onclick="cargarEmpresaParaEditar('${e.id}')"><i class="fas fa-edit"></i></button>
             <button class="btn-delete-mode" style="padding:4px 8px;" onclick="eliminarEmpresa('${e.id}')"><i class="fas fa-trash"></i></button>
           </div>
        </td>
      </tr>`;
  });
});

function sanitizarId(s){ return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[.#$\[\]\/\s]/g,'-').replace(/-+/g,'-').slice(0,50); }

// (Resto de tu lógica para otras pestañas...)
</script>
</body>
</html>
