<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control Centralizado</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* (Tus estilos permanecen igual, no los modifiques) */
        :root { --primary-orange: #ff6600; --bg-page: #050b14; --container-bg: #111e30; --purple-ia: #8b5cf6; --text-light: #f1f5f9; }
        body { background-color: var(--bg-page); color: var(--text-light); font-family: sans-serif; padding: 20px; }
        .admin-container { max-width: 1000px; margin: 0 auto; background: var(--container-bg); padding: 20px; border-radius: 12px; }
    </style>
</head>
<body>

<div class="admin-container">
    <h1>Panel de Control</h1>
    <input type="password" id="geminiApiKey" placeholder="API Key..." onchange="localStorage.setItem('gemini_key', this.value)">
    
    <button id="btnProcesarGemini" onclick="enviarTxtAGeminiWeb()">2. Transformar a JSON con Gemini</button>
    
    <div id="contenedorResultadoVerde" style="display:none;">
        <select id="selectorVacantesDetectadas" onchange="cambiarVacanteVerdeSeleccionada()"></select>
        <textarea id="codigoJsonVerde" readonly></textarea>
    </div>
</div>

<script type="module">
    // ... (Mantén tus importaciones de Firebase originales)

    window.enviarTxtAGeminiWeb = async function() {
        const apiKey = document.getElementById('geminiApiKey').value.trim();
        const btn = document.getElementById('btnProcesarGemini');
        const textoBruto = window.textoArchivoTxtCargado;
        
        if(!apiKey) { alert("Ingresa tu API Key"); return; }
        if(!textoBruto) { alert("Carga un archivo .txt"); return; }

        try {
            btn.disabled = true;
            btn.innerText = "Procesando...";

            // SOLUCIÓN DEFINITIVA: Usamos v1 y gemini-pro (estándar). 
            // Eliminamos todo el bloque 'generation_config' que causaba el error de 'Invalid JSON payload'
            const url = `https://generativelanguage.googleapis.com/v1/models/gemini-pro:generateContent?key=${apiKey}`;
            
            const payload = {
                contents: [{ 
                    parts: [{ text: "Extrae las vacantes del siguiente texto y devuélvelas SOLO como un array de objetos JSON. No incluyas explicaciones, solo el JSON: " + textoBruto }] 
                }]
            };
            
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            
            const data = await response.json();
            
            if (!response.ok) {
                throw new Error(data.error?.message || "Error en la conexión con la IA");
            }

            let respuestaTexto = data.candidates[0].content.parts[0].text;

            // Limpieza robusta del JSON
            const match = respuestaTexto.match(/\[\s*\{[\s\S]*\}\s*\]/g);
            if (match) {
                window.vacantesProcesadasGlobal = JSON.parse(match[0]);
                alert("¡Procesado con éxito!");
                // (Aquí continúa tu lógica de visualización que ya tenías)
            } else {
                throw new Error("La IA no devolvió un formato JSON válido.");
            }

        } catch (error) {
            console.error("Error:", error);
            alert("Error de conexión: " + error.message);
        } finally {
            btn.disabled = false;
            btn.innerText = "2. Transformar a JSON con Gemini";
        }
    }
</script>
</body>
</html>
