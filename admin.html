<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - Bolsa de Trabajo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary-orange: #ff6600; --container-bg: #111e30; --text-light: #f1f5f9; --border-color: #243854; --purple-ia: #8b5cf6; }
        body { background-color: #050b14; color: var(--text-light); font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .admin-container { max-width: 1100px; margin: 0 auto; background: var(--container-bg); padding: 30px; border-radius: 16px; border: 1px solid var(--border-color); }
        .tabs-menu { display: flex; gap: 10px; margin-bottom: 25px; border-bottom: 2px solid var(--border-color); padding-bottom: 10px; }
        .tab-btn { background: #0d1724; color: #94a3b8; border: 1px solid var(--border-color); padding: 12px 20px; border-radius: 8px; cursor: pointer; }
        .tab-btn.active { background: var(--primary-orange); color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .form-admin { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; background: #18273c; padding: 20px; border-radius: 12px; }
    </style>
</head>
<body>

<div class="admin-container">
    <h1><i class="fas fa-sliders-h"></i> Panel de Control</h1>
    
    <div class="form-admin" style="margin-bottom: 20px;">
        <input type="password" id="geminiApiKey" placeholder="Tu API Key..." onchange="localStorage.setItem('gemini_key', this.value)" style="padding: 10px; border-radius: 8px; border: 1px solid var(--purple-ia); background: #0c1524; color: white;">
    </div>

    <div class="tabs-menu">
        <button class="tab-btn active" onclick="showTab('tabPrincipal', this)">Empresas</button>
        <button class="tab-btn" onclick="showTab('tabSecundarias', this)">Vacantes</button>
    </div>

    <div id="tabPrincipal" class="tab-content active">
        <!-- Contenido de Empresas -->
    </div>

    <div id="tabSecundarias" class="tab-content">
        <button id="btnProcesarGemini" onclick="enviarTxtAGeminiWeb()" style="background: var(--purple-ia); color: white; padding: 15px; border: none; border-radius: 8px; cursor: pointer;">
            2. Transformar a JSON con Gemini
        </button>
        <textarea id="codigoJsonVerde" style="width: 100%; height: 150px; background: #061c15; color: #34d399;"></textarea>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const db = getDatabase(initializeApp({ databaseURL: "https://bolsa-de-trabajo-a52e4-default-rtdb.firebaseio.com/" }));

    // FUNCIÓN CORREGIDA Y DEFINITIVA
    window.enviarTxtAGeminiWeb = async function() {
        const apiKey = document.getElementById('geminiApiKey').value.trim();
        const btn = document.getElementById('btnProcesarGemini');
        const textoBruto = window.textoArchivoTxtCargado;
        
        if(!apiKey) { alert("Ingresa tu API Key"); return; }
        
        try {
            btn.disabled = true;
            btn.innerText = "Procesando...";

            // Usamos modelo estable y eliminamos toda configuración conflictiva
            const url = `https://generativelanguage.googleapis.com/v1/models/gemini-pro:generateContent?key=${apiKey}`;
            const payload = {
                contents: [{ parts: [{ text: "Extrae vacantes y devuelve SOLO un array JSON: " + textoBruto }] }]
            };
            
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            
            const data = await response.json();
            if (!response.ok) throw new Error(data.error?.message || "Error en la API");

            const respuestaTexto = data.candidates[0].content.parts[0].text;
            const match = respuestaTexto.match(/\[\s*\{[\s\S]*\}\s*\]/g);
            
            if (match) {
                document.getElementById('codigoJsonVerde').value = match[0];
                alert("¡Procesado!");
            } else {
                throw new Error("Formato inválido");
            }
        } catch (e) {
            alert("Error: " + e.message);
        } finally {
            btn.disabled = false;
            btn.innerText = "2. Transformar a JSON con Gemini";
        }
    }

    window.showTab = function(id, btn) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }
</script>
</body>
</html>
