<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel Admin - Conexión IA Estable</title>
    </head>
<body>
    <div class="admin-container">
        <input type="password" id="geminiApiKey" placeholder="Tu API Key..." onchange="localStorage.setItem('gemini_key', this.value)">
        
        <button id="btnProcesarGemini" onclick="enviarTxtAGeminiWeb()">2. Transformar a JSON con Gemini</button>
        
        <textarea id="codigoJsonVerde" style="width: 100%; height: 200px;"></textarea>
    </div>

<script type="module">
    // --- FUNCIÓN CORREGIDA ---
    window.enviarTxtAGeminiWeb = async function() {
        const apiKey = document.getElementById('geminiApiKey').value.trim();
        const btn = document.getElementById('btnProcesarGemini');
        // Asegúrate de que esta variable exista o venza de tu lector de archivos
        const textoBruto = window.textoArchivoTxtCargado; 
        
        if(!apiKey) { alert("API Key requerida"); return; }
        if(!textoBruto) { alert("Carga un archivo .txt primero"); return; }

        try {
            btn.disabled = true;
            btn.innerText = "Conectando con Gemini...";

            // SOLUCIÓN DEFINITIVA: Usamos v1beta y el modelo gemini-1.5-flash
            // Esta es la ruta que acepta modelos modernos sin errores de 'not found'
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
            
            const payload = {
                "contents": [{
                    "parts": [{
                        "text": "Actúa como extractor de datos. Extrae la información del siguiente texto y responde ÚNICAMENTE con un array JSON. No escribas nada más, solo el JSON: " + textoBruto
                    }]
                }]
            };

            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const data = await response.json();

            if (!response.ok) {
                // Si vuelve a fallar, el error aquí nos dirá exactamente por qué
                throw new Error(data.error?.message || "Error en la petición");
            }

            // Procesar respuesta
            let respuestaTexto = data.candidates[0].content.parts[0].text;
            const regex = /\[\s*\{[\s\S]*\}\s*\]/g;
            const match = respuestaTexto.match(regex);
            
            if (match) {
                document.getElementById('codigoJsonVerde').value = match[0];
                alert("¡Procesado exitosamente!");
            } else {
                throw new Error("La IA no devolvió un JSON válido.");
            }

        } catch (error) {
            console.error(error);
            alert("Error: " + error.message);
        } finally {
            btn.disabled = false;
            btn.innerText = "2. Transformar a JSON con Gemini";
        }
    }
</script>
</body>
</html>
