<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control Centralizado - Bolsa de Trabajo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-orange: #ff6600;
            --secondary-blue: #0f2a4a;
            --bg-page: #050b14;          
            --container-bg: #111e30;     
            --card-bg: #18273c;          
            --white: #ffffff;
            --text-light: #f1f5f9;       
            --text-muted: #94a3b8;       
            --border-color: #243854;     
            --green-whatsapp: #25D366;
            --purple-ia: #8b5cf6;
            --green-success: #10b981;
            --red-danger: #ef4444;
            --blue-update: #0284c7;
            --yellow-warning: #f59e0b;
            --gray-neutral: #475569;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--bg-page);
            color: var(--text-light);
            font-family: 'Segoe UI', system-ui, sans-serif;
            padding: 30px 10px;
            line-height: 1.6;
        }
        .admin-container {
            max-width: 1100px;
            margin: 0 auto;
            background: var(--container-bg);
            padding: 30px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }
        h1 { 
            color: var(--white); 
            text-align: center; 
            margin-bottom: 25px; 
            font-size: 1.8rem;
            display: flex; align-items: center; justify-content: center; gap: 12px;
        }
        h2 { color: var(--text-light); margin: 25px 0 15px; font-size: 1.3rem; }
        
        .tabs-menu {
            display: flex; gap: 10px;
            margin-bottom: 25px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px; flex-wrap: wrap;
        }
        .tab-btn {
            background: #0d1724; color: var(--text-muted);
            border: 1px solid var(--border-color);
            padding: 12px 20px; border-radius: 8px;
            cursor: pointer; font-weight: 700; font-size: 0.95rem;
            transition: all 0.3s ease;
            display: flex; align-items: center; gap: 8px;
        }
        .tab-btn:hover { color: var(--white); border-color: var(--primary-orange); transform: translateY(-2px); }
        .tab-btn.active {
            background: var(--primary-orange); color: white;
            border-color: var(--primary-orange);
            box-shadow: 0 4px 12px rgba(255,102,0,0.3);
        }
        .tab-content { display: none; animation: fadeIn 0.4s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from{opacity:0; transform:translateY(10px)} to{opacity:1; transform:none} }

        .form-admin {
            background: var(--card-bg);
            padding: 25px; border-radius: 12px;
            border: 1px solid var(--border-color);
            margin-bottom: 30px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
        }
        .form-group { display: flex; flex-direction: column; }
        .form-group label { margin-bottom: 6px; font-weight: 600; font-size: 0.9rem; display:flex; align-items:center; gap:5px; }
        .form-group input, .form-group select, .form-group textarea {
            padding: 11px 14px;
            background: #1d2e47;
            border: 1px solid var(--border-color);
            border-radius: 8px; color: white;
            font-size: 0.95rem; font-family: inherit;
            transition: all .3s ease;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none; border-color: var(--primary-orange);
            box-shadow: 0 0 0 3px rgba(255,102,0,.1);
        }
        .form-group textarea { resize: vertical; min-height: 80px; }
        .full-width { grid-column: 1 / -1; }
        
        .btn-add { background: var(--primary-orange); color:white; border:none; padding:14px; border-radius:8px; font-weight:700; cursor:pointer; font-size:1rem; display:flex; align-items:center; justify-content:center; gap:8px; transition:all .3s; }
        .btn-add:hover { background:#e05500; transform:translateY(-2px); }
        .btn-update-final { background: var(--blue-update); color:white; border:none; padding:14px; border-radius:8px; font-weight:700; cursor:pointer; font-size:1rem; display:flex; align-items:center; justify-content:center; gap:8px; transition:all .3s; }
        .btn-update-final:hover { background:#0369a1; transform:translateY(-2px); }
        .btn-clear { background: var(--gray-neutral); color:white; border:none; padding:14px; border-radius:8px; font-weight:700; cursor:pointer; font-size:1rem; display:flex; align-items:center; justify-content:center; gap:8px; transition:all .3s; }
        .btn-clear:hover { background:#334155; transform:translateY(-2px); }
        .dual-buttons-layout { grid-column:1/-1; display:grid; grid-template-columns:1fr 1fr; gap:15px; }
        .triple-buttons-layout { grid-column:1/-1; display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; }

        .ia-box {
            background: rgba(139,92,246,.1);
            border: 1px dashed var(--purple-ia);
            padding:20px; border-radius:12px; grid-column:1/-1;
        }
        .btn-ia { background:var(--purple-ia); color:white; border:none; padding:10px 20px; font-weight:700; border-radius:6px; cursor:pointer; display:inline-flex; align-items:center; gap:6px; transition:.3s; }
        .btn-ia:hover { background:#7c3aed; }
        .file-input-wrapper { position:relative; display:inline-block; margin-top:5px; }
        .file-input-wrapper input[type=file] { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
        .btn-file-custom { background:#0284c7; color:white; padding:10px 20px; font-weight:700; border-radius:6px; display:inline-flex; align-items:center; gap:6px; }
        .section-divider {
            grid-column:1/-1;
            border-bottom:1px dashed var(--border-color);
            color:var(--primary-orange); font-weight:700;
            text-transform:uppercase; font-size:.95rem;
            display:flex; align-items:center; gap:8px;
        }
        .empresas-table { width:100%; border-collapse:collapse; border-radius:8px; overflow:hidden; }
        .empresas-table th, .empresas-table td { padding:12px 15px; text-align:left; border-bottom:1px solid var(--border-color); }
        .empresas-table th { background:#0d1724; color:var(--primary-orange); }
        .empresas-table tr:hover { background:rgba(255,255,255,.03); }
        .empresas-table td img { width:45px; border-radius:4px; background:white; padding:2px; }
        .selector-puestos-verde {
            background:#112d24; border:1px solid var(--green-success);
            color:#34d399; padding:12px; border-radius:6px;
            width:100%; font-weight:bold;
        }
        .manager-box {
            background:rgba(239,68,68,.05);
            border:1px dashed var(--red-danger);
            padding:20px; border-radius:12px; grid-column:1/-1;
        }
        .actions-layout { display:flex; gap:15px; flex-wrap:wrap; margin-top:12px; }
        .btn-edit-mode { background:#f59e0b; color:#000; border:none; padding:12px 20px; font-weight:700; border-radius:6px; cursor:pointer; display:flex; align-items:center; gap:8px; }
        .btn-delete-mode { background:var(--red-danger); color:#fff; border:none; padding:12px 20px; font-weight:700; border-radius:6px; cursor:pointer; display:flex; align-items:center; gap:8px; }
        .alert-box { padding:12px 16px; border-radius:8px; margin:12px 0; display:flex; align-items:center; gap:10px; }
        .alert-success { background:rgba(16,185,129,.1); border:1px solid var(--green-success); color:#86efac; }
        .alert-info { background:rgba(2,132,199,.1); border:1px solid var(--blue-update); color:#7dd3fc; }
        .code-container { position:relative; }
        .btn-copy {
            position:absolute; top:8px; right:8px;
            background:rgba(0,0,0,.6); color:white;
            border:none; border-radius:4px; padding:6px 10px;
            cursor:pointer; font-size:.8rem;
        }
        textarea[readonly] { background:#0a1422 !important; }
    </style>
</head>
<body>

<div class="admin-container">
    <h1><i class="fas fa-sliders-h"></i> Panel de Administración Global</h1>
    
    <div class="tabs-menu">
        <button class="tab-btn active" id="btnTab1"><i class="fas fa-building"></i> 1. Registrar Empresa</button>
        <button class="tab-btn" id="btnTab2"><i class="fas fa-briefcase"></i> 2. Control de Vacantes Masivo</button>
        <button class="tab-btn" id="btnTab3"><i class="fas fa-file-code"></i> 3. Procesador TXT ➡ JSON</button>
    </div>

    <div id="tabPrincipal" class="tab-content active">
        <div class="form-admin">
            <div class="section-divider"><i class="fas fa-edit"></i> Alta / Edición de Empresa Base</div>
            <div class="form-group">
                <label><i class="fas fa-key"></i> ID Empresa</label>
                <input type="text" id="admId" oninput="this.value=this.value.toLowerCase().replace(/[^a-z0-9-_]/g,'')">
            </div>
            <div class="form-group"><label>Nombre</label><input id="admNombre"></div>
            <div class="form-group"><label>Ubicación</label><input id="admUbicacion"></div>
            <div class="form-group full-width"><label>Enlace</label><input id="admLink"></div>
            <div class="form-group"><label>Logo URL</label><input id="admImagen"></div>
            <div class="form-group"><label>Etiquetas</label><input id="admTags"></div>
            <div class="dual-buttons-layout">
                <button class="btn-add" onclick="agregarEmpresaPrincipal()"><i class="fas fa-save"></i> Guardar</button>
                <button class="btn-clear" onclick="limpiarFormularioEmpresa()"><i class="fas fa-eraser"></i> Limpiar</button>
            </div>
        </div>
        <h2>Directorio</h2>
        <div style="overflow-x:auto">
            <table class="empresas-table">
                <thead><tr><th>Logo</th><th>ID</th><th>Empresa</th><th>Ubicación</th></tr></thead>
                <tbody id="adminTablaEmpresas"><tr><td colspan="4" style="text-align:center;color:var(--text-muted)">Cargando...</td></tr></tbody>
            </table>
        </div>
    </div>

    <div id="tabSecundarias" class="tab-content">
        <div class="form-admin">
            <div class="section-divider"><i class="fas fa-cog"></i> Configuración</div>
            <div class="form-group full-width">
                <label>Empresa</label>
                <select id="secEmpresaSelect" onchange="escucharVacantesExistentes(this.value)">
                    <option value="">-- Elige --</option>
                </select>
            </div>
            <div class="manager-box" id="boxGestionVacantes" style="display:none">
                <label style="color:var(--red-danger);font-weight:700">Modificar / Eliminar</label>
                <select id="selectorVacantesEnFirebase" style="width:100%;padding:11px;background:#221317;border:1px solid var(--red-danger);color:#fca5a5;border-radius:8px;margin:8px 0"></select>
                <div class="actions-layout">
                    <button class="btn-edit-mode" onclick="cargarVacanteParaEditar()"><i class="fas fa-edit"></i> Cargar</button>
                    <button class="btn-delete-mode" onclick="eliminarVacanteWeb()"><i class="fas fa-trash"></i> Eliminar</button>
                </div>
            </div>
            <div class="form-group"><label>ID Puesto</label><input id="secPuestoId" oninput="this.value=this.value.toLowerCase().replace(/[^a-z0-9-_]/g,'')"></div>

            <div class="ia-box">
                <label style="color:var(--purple-ia);font-weight:700"><i class="fas fa-bolt"></i> Extractor V5.0</label>
                <div style="display:flex;gap:15px;align-items:center;flex-wrap:wrap;margin:10px 0">
                    <div class="file-input-wrapper">
                        <div class="btn-file-custom"><i class="fas fa-folder-open"></i> Cargar TXT</div>
                        <input type="file" id="archivoTxtInput" accept=".txt" onchange="procesarTxtWhatsAppV5()">
                    </div>
                    <span id="nombreArchivoCargado" style="color:var(--primary-orange);font-weight:700">Ningún archivo</span>
                </div>
                <div id="contenedorResultadoVerde" style="display:none">
                    <select id="selectorVacantesDetectadas" class="selector-puestos-verde" onchange="cambiarVacanteVerdeSeleccionada()"></select>
                    <div class="code-container">
                        <button class="btn-copy" onclick="copiarAlPortapapeles('codigoJsonVerde')"><i class="fas fa-copy"></i></button>
                        <textarea id="codigoJsonVerde" readonly style="width:100%;min-height:140px;background:#061c15;color:#34d399;border:1px solid var(--green-success);border-radius:8px;padding:10px;font-family:monospace"></textarea>
                    </div>
                    <button class="btn-ia" onclick="transferirAlEspacioMorado()" style="width:100%;background:var(--green-success);margin-top:8px"><i class="fas fa-arrow-down"></i> Transferir</button>
                </div>
                <textarea id="iaTextoPegar" style="width:100%;min-height:80px;border-color:var(--purple-ia);border-radius:8px;margin-top:10px;padding:10px"></textarea>
                <button class="btn-ia" onclick="procesarTextoBrutoTxt()"><i class="fas fa-magic"></i> Rellenar formulario</button>
            </div>

            <div class="section-divider"><i class="fas fa-file-alt"></i> Datos del puesto</div>
            <div class="form-group">
                <label>Estatus</label>
                <select id="secEstatus">
                    <option value="disponible">✅ Activa</option>
                    <option value="no_disponible">❌ Pausada</option>
                </select>
            </div>
            <div class="form-group"><label>Vacante</label><input id="secVacanteNombre"></div>
            <div class="form-group"><label>Salario</label><input id="secSalario"></div>
            <div class="form-group"><label>Edad</label><input id="secEdad"></div>
            <div class="form-group"><label>Ubicación</label><input id="secLugarOrigen"></div>
            <div class="form-group"><label>Turnos</label><input id="secTurnos"></div>
            <div class="form-group">
                <label>Sexo</label>
                <select id="secSexo">
                    <option>Indistinto</option><option>Masculino</option><option>Femenino</option>
                </select>
            </div>
            <div class="form-group"><label>Experiencia</label><input id="secExperiencia"></div>
            <div class="form-group"><label>Escolaridad</label><input id="secEscolaridad"></div>
            <div class="form-group"><label>Banner URL</label><input id="secBannerUrl"></div>
            <div class="form-group full-width"><label>Actividades / Beneficios</label><textarea id="secActividades"></textarea></div>
            <div class="form-group full-width" style="border:1px solid var(--primary-orange);padding:15px;border-radius:8px;background:rgba(255,102,0,.05)">
                <label style="color:var(--primary-orange);font-weight:700">Información general / reglas</label>
                <textarea id="secInfoGeneral" style="min-height:110px;border-color:var(--primary-orange)"></textarea>
            </div>
            <div class="triple-buttons-layout">
                <button class="btn-add" onclick="guardarComoNuevaVacante()"><i class="fas fa-cloud-upload"></i> Subir NUEVA</button>
                <button class="btn-update-final" onclick="guardarActualizacionVacante()"><i class="fas fa-sync"></i> ACTUALIZAR</button>
                <button class="btn-clear" onclick="limpiarFormularioVacante()"><i class="fas fa-eraser"></i> Limpiar</button>
            </div>
        </div>
    </div>

    <div id="tabProcesador" class="tab-content">
        <div class="form-admin">
            <div class="section-divider"><i class="fas fa-file-code"></i> TXT ➡ JSON</div>
            <div class="alert-box alert-info full-width"><i class="fas fa-info-circle"></i><div>Convierte cualquier texto a JSON estructurado al instante</div></div>
            <div class="form-group full-width">
                <div style="display:flex;gap:15px;align-items:center;flex-wrap:wrap">
                    <div class="file-input-wrapper">
                        <div class="btn-file-custom"><i class="fas fa-upload"></i> Seleccionar TXT</div>
                        <input type="file" id="archivoTxtGlobal" accept=".txt" onchange="procesarArchivoGlobal()">
                    </div>
                    <span id="nombreArchivoGlobal" style="color:var(--primary-orange);font-weight:700">Sin archivo</span>
                </div>
            </div>
            <div class="form-group full-width" id="pasoTexto" style="display:none">
                <label>Texto original</label>
                <textarea id="textoOriginalGlobal" readonly style="min-height:120px"></textarea>
            </div>
            <div class="form-group full-width" id="pasoResultado" style="display:none">
                <label>JSON generado</label>
                <div class="code-container">
                    <button class="btn-copy" onclick="copiarAlPortapapeles('jsonResultadoGlobal')"><i class="fas fa-copy"></i></button>
                    <button class="btn-copy" style="right:90px;background:var(--green-success)" onclick="descargarJSON()"><i class="fas fa-download"></i></button>
                    <textarea id="jsonResultadoGlobal" readonly style="min-height:280px;background:#061c15;color:#34d399;border:1px solid var(--green-success);border-radius:8px;padding:10px;font-family:monospace"></textarea>
                </div>
            </div>
            <div class="form-group full-width" id="pasoResumen" style="display:none">
                <div class="alert-box alert-success"><i class="fas fa-check"></i><div>Detectados: <strong id="cantidadElementos">0</strong> registros</div></div>
            </div>
        </div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getDatabase, ref, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

const app = initializeApp({ databaseURL: "https://bolsa-de-trabajo-a52e4-default-rtdb.firebaseio.com/" });
const db = getDatabase(app);
let vacantesProcesadasGlobal = [], baseVacantesActualesEnFirebase = {}, jsonGlobal = [];

const [t1,t2,t3] = [document.getElementById('btnTab1'),document.getElementById('btnTab2'),document.getElementById('btnTab3')];
const [c1,c2,c3] = [document.getElementById('tabPrincipal'),document.getElementById('tabSecundarias'),document.getElementById('tabProcesador')];
function activar(a,b,C,d,e,f){a.classList.add('active');b.classList.remove('active');C.classList.remove('active');d.classList.add('active');e.classList.remove('active');f.classList.remove('active')}
t1.onclick=()=>activar(t1,t2,t3,c1,c2,c3);
t2.onclick=()=>activar(t2,t1,t3,c2,c1,c3);
t3.onclick=()=>activar(t3,t1,t2,c3,c1,c2);

window.copiarAlPortapapeles = id => {
    const el = document.getElementById(id); el.select();
    navigator.clipboard.writeText(el.value).then(()=>{
        const a=document.createElement('div');
        Object.assign(a.style,{position:'fixed',top:'20px',right:'20px',background:'var(--green-success)',color:'#fff',padding:'12px 20px',borderRadius:'8px',zIndex:9999});
        a.innerHTML='<i class="fas fa-check"></i> ¡Copiado!';
        document.body.appendChild(a); setTimeout(()=>a.remove(),2200);
    });
};
const limpiarTextoEspecial = t => t.normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[🔰*•\-‼️💠☑️✔️💲➕📍🏭✅👷()]/g,'').trim();

window.limpiarFormularioEmpresa = () => ['admId','admNombre','admUbicacion','admLink','admImagen','admTags'].forEach(i=>document.getElementById(i).value='');
window.agregarEmpresaPrincipal = () => {
    const [id,nombre,ubicacion,link,imagen,tags] = ['admId','admNombre','admUbicacion','admLink','admImagen','admTags'].map(i=>document.getElementById(i).value.trim());
    if(!id||!nombre) return alert('❌ ID y Nombre obligatorios');
    set(ref(db,`empresas/${id}`),{id,nombre,ubicacion,link,imagen,tags}).then(()=>{alert('✅ Guardada');limpiarFormularioEmpresa()});
};

onValue(ref(db,'empresas'),s=>{
    const e = s.val()||{};
    const sel = document.getElementById('secEmpresaSelect');
    const tb = document.getElementById('adminTablaEmpresas');
    sel.innerHTML='<option value="">-- Elige --</option>'; tb.innerHTML='';
    Object.values(e).forEach(x=>{
        sel.innerHTML += `<option value="${x.id}">${x.nombre}</option>`;
        tb.innerHTML += `<tr><td><img src="${x.imagen||'https://via.placeholder.com/45'}"></td><td>${x.id}</td><td>${x.nombre}</td><td>${x.ubicacion||''}</td></tr>`;
    });
});

window.escucharVacantesExistentes = id => {
    const b = document.getElementById('boxGestionVacantes'), s = document.getElementById('selectorVacantesEnFirebase');
    if(!id) return b.style.display='none';
    onValue(ref(db,`vacantes_detalles/${id}`),sn=>{
        baseVacantesActualesEnFirebase = sn.val()||{};
        const k = Object.keys(baseVacantesActualesEnFirebase).filter(x=>x&&x!=='undefined');
        s.innerHTML = !k.length ? '<option>-- Sin vacantes --</option>' : '<option value="">-- Selecciona --</option>'+k.map(p=>`<option value="${p}">[${p}] ${baseVacantesActualesEnFirebase[p].vacanteNombre||''}</option>`).join('');
        b.style.display='block';
    });
};
window.cargarVacanteParaEditar = () => {
    const k = document.getElementById('selectorVacantesEnFirebase').value;
    if(!k||!baseVacantesActualesEnFirebase[k]) return alert('❌ Selecciona una');
    const v = baseVacantesActualesEnFirebase[k];
    document.getElementById('secPuestoId').value = k;
    document.getElementById('secEstatus').value = v.estatus || 'disponible';
    document.getElementById('secVacanteNombre').value = v.vacanteNombre || '';
    document.getElementById('secSalario').value = v.salario || '';
    document.getElementById('secEdad').value = v.edad || '';
    document.getElementById('secLugarOrigen').value = v.lugarOrigen || '';
    document.getElementById('secTurnos').value = v.turnos || '';
    document.getElementById('secSexo').value = v.sexo || 'Indistinto';
    document.getElementById('secExperiencia').value = v.experiencia || '';
    document.getElementById('secEscolaridad').value = v.escolaridad || '';
    document.getElementById('secBannerUrl').value = v.bannerUrl || '';
    document.getElementById('secActividades').value = v.actividades || '';
    document.getElementById('secInfoGeneral').value = v.informacionGeneral || '';
    alert('✏️ Cargada correctamente');
};
window.eliminarVacanteWeb = () => {
    const e = document.getElementById('secEmpresaSelect').value, p = document.getElementById('selectorVacantesEnFirebase').value;
    if(!e||!p) return alert('❌ Faltan datos');
    if(confirm(`⚠️ Borrar definitivamente "${baseVacantesActualesEnFirebase[p].vacanteNombre}"?`))
        remove(ref(db,`vacantes_detalles/${e}/${p}`)).then(()=>alert('🗑️ Eliminada'));
};
window.limpiarFormularioVacante = () => {
    ['secPuestoId','secVacanteNombre','secSalario','secEdad','secLugarOrigen','secTurnos','secExperiencia','secEscolaridad','secBannerUrl','secActividades','secInfoGeneral','iaTextoPegar','codigoJsonVerde'].forEach(i=>document.getElementById(i).value='');
    document.getElementById('secSexo').value='Indistinto';
    document.getElementById('secEstatus').value='disponible';
    document.getElementById('contenedorResultadoVerde').style.display='none';
};

window.procesarTxtWhatsAppV5 = () => {
    const f = document.getElementById('archivoTxtInput').files[0]; if(!f) return;
    document.getElementById('nombreArchivoCargado').textContent='📄 '+f.name;
    const r = new FileReader();
    r.onload = ev => {
        const lineas = ev.target.result.split(/\r?\n/).map(limpiarTextoEspecial).filter(Boolean);
        const turnos = lineas.filter(l=>/(turno|rotativ|matutin|vespertin|4x3)/i.test(l)).join(' / ') || 'Turnos rotativos';
        let info=[],cap=false;
        lineas.forEach(l=>{if(/(reingres|consideracion|agendar|banco|examen|tatuaje|doping|nomin)/i.test(l))cap=true;if(cap&&!info.includes(l))info.push(l)});
        const infoT = info.join('\n') || 'Sin restricciones';
        let zona = 'Zona Industrial';
        for(const l of lineas){ if(/(parque kia|pesquer|cieneg|tlaquepaq|carreter|colonia|📍)/i.test(l)){zona=l;break} }
        const act = lineas.filter(l=>/(prestaciones|vales|comedor|ahorro|aguinaldo|vacaciones|transporte|uniforme|descanso)/i.test(l)&&!/solicita/i.test(l)).join(' / ');
        const disp = ["ayudante","montacarguista","técnico","inspector","operador","guardia","auxiliar","limpieza","chofer","soldador","ensamblador","empaquetador"];
        const puestos = []; let actual = null;
        lineas.forEach(l=>{
            if(disp.some(d=>l.toLowerCase().includes(d))){
                actual = { id:l.toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,''), vacanteNombre:l, salario:'', edad:'', lugarOrigen:zona, turnos, actividades:act, informacionGeneral:infoT, sexo:'Indistinto', experiencia:'', escolaridad:'', estatus:'disponible' };
                puestos.push(actual);
            }
            if(actual){
                if(/\d{2}\s*a\s*\d{2}|edad|años/.test(l)&&!actual.edad) actual.edad=l;
                if(/\$|pesos|semanal|quincen/.test(l)&&!actual.salario) actual.salario=l;
                if(/hombre|varón/.test(l.toLowerCase())) actual.sexo='Masculino';
                if(/mujer|dama/.test(l.toLowerCase())) actual.sexo='Femenino';
            }
        });
        if(!puestos.length) puestos.push({id:'auto',vacanteNombre:'Vacante',lugarOrigen:zona,turnos,actividades:act,informacionGeneral:infoT});
        vacantesProcesadasGlobal = puestos;
        const sel = document.getElementById('selectorVacantesDetectadas');
        sel.innerHTML = puestos.map((p,i)=>`<option value="${i}">${p.vacanteNombre}</option>`).join('');
        document.getElementById('codigoJsonVerde').value = JSON.stringify(puestos[0],null,2);
        document.getElementById('contenedorResultadoVerde').style.display='block';
    };
    r.readAsText(f,'UTF-8');
};
window.cambiarVacanteVerdeSeleccionada = () => document.getElementById('codigoJsonVerde').value = JSON.stringify(vacantesProcesadasGlobal[document.getElementById('selectorVacantesDetectadas').value],null,2);
window.transferirAlEspacioMorado = () => document.getElementById('iaTextoPegar').value = document.getElementById('codigoJsonVerde').value;
window.procesarTextoBrutoTxt = () => {
    try{
        const o = JSON.parse(document.getElementById('iaTextoPegar').value);
        Object.entries(o).forEach(([k,v])=>{
            const el = document.getElementById('sec'+k[0].toUpperCase()+k.slice(1));
            if(el) el.value = v ?? '';
        });
        alert('✅ Rellenado automáticamente');
    }catch(e){alert('❌ JSON inválido')}
};
const armar = () => ({
    estatus:document.getElementById('secEstatus').value,
    vacanteNombre:document.getElementById('secVacanteNombre').value.trim(),
    salario:document.getElementById('secSalario').value.trim(),
    edad:document.getElementById('secEdad').value.trim(),
    lugarOrigen:document.getElementById('secLugarOrigen').value.trim(),
    turnos:document.getElementById('secTurnos').value.trim(),
    sexo:document.getElementById('secSexo').value,
    experiencia:document.getElementById('secExperiencia').value.trim(),
    escolaridad:document.getElementById('secEscolaridad').value.trim(),
    bannerUrl:document.getElementById('secBannerUrl').value.trim(),
    actividades:document.getElementById('secActividades').value.trim(),
    informacionGeneral:document.getElementById('secInfoGeneral').value.trim(),
    actualizado:new Date().toISOString()
});
window.guardarComoNuevaVacante = () => {
    const e=document.getElementById('secEmpresaSelect').value, p=document.getElementById('secPuestoId').value.trim().toLowerCase();
    if(!e||!p) return alert('❌ Empresa e ID obligatorios');
    set(ref(db,`vacantes_detalles/${e}/${p}`),armar()).then(()=>{alert('✅ Nueva vacante guardada');limpiarFormularioVacante()});
};
window.guardarActualizacionVacante = () => {
    const e=document.getElementById('secEmpresaSelect').value, p=document.getElementById('secPuestoId').value.trim().toLowerCase();
    if(!e||!p||!confirm('¿Confirmas actualizar esta vacante?')) return;
    set(ref(db,`vacantes_detalles/${e}/${p}`),armar()).then(()=>alert('✅ Actualizada correctamente'));
};
window.procesarArchivoGlobal = () => {
    const f = document.getElementById('archivoTxtGlobal').files[0]; if(!f) return;
    document.getElementById('nombreArchivoGlobal').textContent='📄 '+f.name;
    const r = new FileReader();
    r.onload = ev => {
        const txt = ev.target.result;
        document.getElementById('textoOriginalGlobal').value = txt;
        document.getElementById('pasoTexto').style.display='block';
        const lineas = txt.split(/\r?\n/).map(limpiarTextoEspecial).filter(Boolean);
        const lista = []; let it = null;
        lineas.forEach(l=>{
            if(/^\d+\.?\s|^[•\-\*]|\b(ayudante|operador|puesto|vacante)\b/i.test(l)){ if(it) lista.push(it); it = {titulo:l,detalles:[]}; }
            else if(it) it.detalles.push(l);
        });
        if(it) lista.push(it);
        if(!lista.length) lista.push({contenido:lineas});
        jsonGlobal = lista;
        document.getElementById('jsonResultadoGlobal').value = JSON.stringify(lista,null,2);
        document.getElementById('cantidadElementos').textContent = lista.length;
        document.getElementById('pasoResultado').style.display = 'block';
        document.getElementById('pasoResumen').style.display = 'block';
    };
    r.readAsText(f,'UTF-8');
};
window.descargarJSON = () => {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([JSON.stringify(jsonGlobal,null,2)],{type:'application/json'}));
    a.download = 'vacantes-procesadas.json'; 
    a.click();
};
