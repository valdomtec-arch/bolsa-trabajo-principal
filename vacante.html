<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolsa de Trabajo - Detalles de la Vacante</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --primary-orange: #ff6600;
            --secondary-blue: #0f2a4a;
            --bg-page: #050b14;
            --container-bg: #111e30;
            --card-bg: #18273c;
            --white: #ffffff;
            --text-light: #f1f5f9;
            --text-muted: #94a3b8;
            --border-color: #243854;
            --green-whatsapp: #25D366;
        }
        body {
            background-color: var(--bg-page);
            color: var(--text-light);
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0; padding: 20px 10px;
        }
        .container {
            max-width: 750px;
            margin: 0 auto;
            background: var(--container-bg);
            border-radius: 16px;
            border: 1px solid var(--border-color);
            overflow: hidden;
            padding-bottom: 30px;
        }
        .banner-container { width: 100%; position: relative; background: #0d1724; }
        .banner-img { width: 100%; height: auto; max-height: 280px; object-fit: cover; display: block; }
        .header-info { padding: 20px; text-align: center; border-bottom: 1px solid var(--border-color); }
        .logo-empresa { width: 90px; height: 90px; border-radius: 50%; background: white; padding: 4px; object-fit: contain; margin-top: -60px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        
        .menu-puestos { padding: 25px; }
        .puesto-item-btn {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 18px; border-radius: 10px; margin-bottom: 12px;
            width: 100%; text-align: left; color: white; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center;
            transition: 0.3s;
        }
        .puesto-item-btn:hover { border-color: var(--primary-orange); background: #1d2f49; }
        .puesto-item-btn h3 { margin: 0 0 5px 0; color: var(--primary-orange); }
        .puesto-item-btn p { margin: 0; font-size: 0.9rem; color: var(--text-muted); }

        .detalles-vacante { padding: 20px; }
        .grid-requisitos { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .req-card { background: var(--card-bg); padding: 15px; border-radius: 8px; border: 1px solid var(--border-color); display: flex; align-items: center; gap: 12px; }
        .req-card i { color: var(--primary-orange); font-size: 1.3rem; }
        .req-card div p { margin: 0; font-size: 0.8rem; color: var(--text-muted); }
        .req-card div h4 { margin: 2px 0 0 0; font-size: 0.95rem; color: white; }

        .bloque-actividades { background: var(--card-bg); padding: 20px; border-radius: 10px; border: 1px solid var(--border-color); margin-bottom: 25px; white-space: pre-line; }

        .form-registro { padding: 20px; border-top: 1px solid var(--border-color); }
        .form-group { display: flex; flex-direction: column; margin-bottom: 15px; }
        .form-group label { margin-bottom: 6px; font-weight: 600; font-size: 0.9rem; }
        .form-group input { padding: 12px; background: #132237; border: 1px solid var(--border-color); border-radius: 8px; color: white; font-size: 1rem; }
        .form-group input:focus { border-color: var(--primary-orange); outline: none; }
        
        .btn-whatsapp { background: var(--green-whatsapp); color: white; border: none; padding: 15px; border-radius: 8px; width: 100%; font-size: 1.05rem; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.3s; margin-top: 10px; }
        .btn-whatsapp:hover { background: #1ebd58; }
        
        .loader { text-align: center; padding: 40px; font-size: 1.2rem; color: var(--text-muted); }
        .msg-espera { text-align: center; color: var(--primary-orange); font-weight: bold; font-size: 1.2rem; margin: 20px 0; }
    </style>
</head>
<body>

<div class="container" id="contenidoCentral">
    <div class="loader" id="spinnerCarga"><i class="fas fa-spinner fa-spin"></i> Cargando plataforma de reclutamiento...</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = { databaseURL: "https://bolsa-de-trabajo-a52e4-default-rtdb.firebaseio.com/" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Capturar parámetros URL
    const urlParams = new URLSearchParams(window.location.search);
    const empresaId = urlParams.get('empresa');
    const puestoId = urlParams.get('puesto');

    const centro = document.getElementById('contenidoCentral');

    if (!empresaId) {
        centro.innerHTML = `<div class="loader" style="color:#dc2626;"><i class="fas fa-exclamation-triangle"></i> Enlace inválido. No se especificó ninguna empresa.</div>`;
    } else {
        // Traer primero los datos de la empresa base
        onValue(ref(db, `empresas/${empresaId}`), (snapEmpresa) => {
            const empresaData = snapEmpresa.val();
            if (!empresaData) {
                centro.innerHTML = `<div class="loader" style="color:#dc2626;"><i class="fas fa-ban"></i> La empresa solicitada no existe o está inactiva.</div>`;
                return;
            }

            // Si hay un puesto específico en la URL, cargar esa vacante directo
            if (puestoId) {
                cargarVacanteEspecifica(empresaData, puestoId);
            } else {
                // Si no hay puesto, leer el catálogo completo de vacantes asignadas a la empresa
                cargarMenuDeVacantes(empresaData);
            }
        });
    }

    // FUNCIÓN A: MOSTRAR MENÚ CUANDO LA EMPRESA TIENE MÚLTIPLES PUESTOS
    function cargarMenuDeVacantes(empresa) {
        onValue(ref(db, `vacantes_detalles/${empresa.id}`), (snapVacantes) => {
            const listaVacantes = snapVacantes.val();
            
            let htmlBase = `
                <div class="banner-container">
                    <img src="${empresa.imagen}" class="banner-img" style="filter: blur(8px); opacity: 0.3;">
                </div>
                <div class="header-info">
                    <img src="${empresa.imagen}" class="logo-empresa" onerror="this.src='https://placehold.co/100'">
                    <h2>${empresa.nombre}</h2>
                    <p style="color: var(--text-muted);"><i class="fas fa-map-marker-alt"></i> ${empresa.ubicacion}</p>
                </div>
                <div class="menu-puestos">
                    <h3 style="margin-bottom: 20px; text-align:center; border-bottom:1px solid var(--border-color); padding-bottom:10px;">Vacantes Disponibles Actualmente</h3>`;

            if (!listaVacantes || Object.keys(listaVacantes).length === 0) {
                htmlBase += `<p style="text-align:center; color: var(--text-muted); padding: 20px;">De momento no hay vacantes activas asignadas. Vuelve más tarde.</p>`;
            } else {
                Object.keys(listaVacantes).forEach(key => {
                    const vac = listaVacantes[key];
                    if (vac.estatus !== 'no_disponible') {
                        htmlBase += `
                            <button class="puesto-item-btn" onclick="window.location.href='?empresa=${empresa.id}&puesto=${vac.puestoId}'">
                                <div>
                                    <h3>${vac.vacanteNombre}</h3>
                                    <p><i class="fas fa-money-bill-wave"></i> ${vac.salario}</p>
                                </div>
                                <i class="fas fa-chevron-right" style="color: var(--primary-orange);"></i>
                            </button>`;
                    }
                });
            }

            htmlBase += `</div>`;
            centro.innerHTML = htmlBase;
        });
    }

    // FUNCIÓN B: MOSTRAR DETALLES COMPLETOS DE UNA VACANTE
    function cargarVacanteEspecifica(empresa, pId) {
        onValue(ref(db, `vacantes_detalles/${empresa.id}/${pId}`), (snapVacante) => {
            const vacante = snapVacante.val();
            if (!vacante) {
                centro.innerHTML = `<div class="loader" style="color:#dc2626;"><i class="fas fa-search"></i> La vacante especificada no existe en esta empresa.</div>`;
                return;
            }

            const bannerFinal = vacante.bannerUrl ? vacante.bannerUrl : empresa.imagen;

            centro.innerHTML = `
                <div class="banner-container">
                    <img src="${bannerFinal}" class="banner-img" onerror="this.src='https://placehold.co/600x250'">
                </div>
                <div class="header-info">
                    <img src="${empresa.imagen}" class="logo-empresa" onerror="this.src='https://placehold.co/100'">
                    <h2>${vacante.vacanteNombre}</h2>
                    <h3 style="color: var(--primary-orange); margin: 5px 0;">${empresa.nombre}</h3>
                    <p style="color: var(--text-muted); margin:0;"><i class="fas fa-map-marker-alt"></i> ${empresa.ubicacion}</p>
                </div>

                <div class="detalles-vacante">
                    <div class="grid-requisitos">
                        <div class="req-card"><i class="fas fa-money-bill-wave"></i><div><p>Sueldo Ofrecido</p><h4>${vacante.salario}</h4></div></div>
                        <div class="req-card"><i class="fas fa-birthday-cake"></i><div><p>Edad Requerida</p><h4>${vacante.edad}</h4></div></div>
                        <div class="req-card"><i class="fas fa-clock"></i><div><p>Turnos / Horarios</p><h4>${vacante.turnos}</h4></div></div>
                        <div class="req-card"><i class="fas fa-user-friends"></i><div><p>Sexo</p><h4>${vacante.sexo}</h4></div></div>
                        <div class="req-card"><i class="fas fa-briefcase"></i><div><p>Experiencia</p><h4>${vacante.experiencia}</h4></div></div>
                        <div class="req-card"><i class="fas fa-graduation-cap"></i><div><p>Escolaridad</p><h4>${vacante.escolaridad}</h4></div></div>
                        <div class="req-card"><i class="fas fa-map-signs"></i><div><p>Zonas de Reclutamiento</p><h4>${vacante.lugarOrigen}</h4></div></div>
                    </div>

                    <h3>Actividades y Prestaciones:</h3>
                    <div class="bloque-actividades">${vacante.actividades}</div>
                    
                    <div class="msg-espera">¡Te esperamos!</div>
                </div>

                <div class="form-registro">
                    <h3>Formulario de Registro Express</h3>
                    <div class="form-group">
                        <label>Nombre Completo:</label>
                        <input type="text" id="regNombre" placeholder="Escribe tu nombre y apellidos">
                    </div>
                    <div class="form-group">
                        <label>CURP Obligatoria (18 caracteres):</label>
                        <input type="text" id="regCurp" maxlength="18" placeholder="Ingresa tu CURP completa" style="text-transform: uppercase;">
                    </div>
                    <div class="form-group">
                        <label>Teléfono de Contacto:</label>
                        <input type="tel" id="regTelefono" placeholder="Ej: 3312345678">
                    </div>
                    
                    <button class="btn-whatsapp" id="btnEnviarRegistro"><i class="fab fa-whatsapp"></i> Postularse Vía WhatsApp Express</button>
                    
                    <button class="puesto-item-btn" style="margin-top:20px; background:transparent; justify-content:center; gap:8px; font-size:0.9rem;" onclick="window.location.href='?empresa=${empresa.id}'">
                        <i class="fas fa-arrow-left"></i> Ver otras vacantes de esta empresa
                    </button>
                </div>`;

            // Asignar el evento al botón dinámico una vez renderizado
            document.getElementById('btnEnviarRegistro').onclick = () => enviarPostulacionAWhatsapp(empresa, vacante);
        });
    }

    // ENVIAR REGISTRO, GENERAR PDF DINÁMICO Y ABRIR WHATSAPP
    function enviarPostulacionAWhatsapp(empresa, vacante) {
        const nombre = document.getElementById('regNombre').value.trim();
        const curp = document.getElementById('regCurp').value.trim().toUpperCase();
        const telefono = document.getElementById('regTelefono').value.trim();

        if (!nombre || !curp || !telefono) { alert("Por favor complete todos los campos obligatorios."); return; }
        if (curp.length !== 18) { alert("La CURP debe tener exactamente 18 caracteres."); return; }

        // 1. GENERAR EL PDF CON JSPDF
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();

        doc.setFillColor(15, 42, 74);
        doc.rect(0, 0, 210, 35, 'F');
        doc.setTextColor(255, 255, 255);
        doc.setFontSize(20);
        doc.setFont("helvetica", "bold");
        doc.text("SOLICITUD DE EMPLEO DIGITAL", 15, 23);

        doc.setTextColor(0, 0, 0);
        doc.setFontSize(14);
        doc.text("DATOS DEL CANDIDATO", 15, 50);
        doc.setLineWidth(0.5);
        doc.line(15, 53, 195, 53);

        doc.setFontSize(11);
        doc.setFont("helvetica", "normal");
        doc.text(`Nombre Completo: ${nombre}`, 15, 63);
        doc.text(`CURP: ${curp}`, 15, 71);
        doc.text(`Teléfono: ${telefono}`, 15, 79);

        doc.setFont("helvetica", "bold");
        doc.text("VACANTE A LA QUE POSTULA", 15, 95);
        doc.line(15, 98, 195, 98);

        doc.setFont("helvetica", "normal");
        doc.text(`Empresa: ${empresa.nombre}`, 15, 108);
        doc.text(`Puesto: ${vacante.vacanteNombre}`, 15, 116);
        doc.text(`Sueldo Base: ${vacante.salario}`, 15, 124);
        doc.text(`Horario/Turno: ${vacante.turnos}`, 15, 132);
        doc.text(`Ubicación: ${empresa.ubicacion}`, 15, 140);

        doc.setFontSize(10);
        doc.setTextColor(120, 120, 120);
        doc.text("Este documento fue generado automáticamente por la Bolsa de Trabajo Oficial.", 15, 160);

        // Descargar PDF localmente en el celular/computadora del usuario
        doc.save(`Solicitud_${nombre.replace(/\s+/g, '_')}.pdf`);

        // 2. ENVIAR MENSAJE PERSONALIZADO A WHATSAPP
        const mensajeExpress = `Hola, me interesa la vacante de *${vacante.vacanteNombre}* en *${empresa.nombre}*.\n\n` +
                               `Mis datos de postulación son:\n` +
                               `• *Nombre:* ${nombre}\n` +
                               `• *CURP:* ${curp}\n` +
                               `• *Teléfono:* ${telefono}\n\n` +
                               `Ya tengo mi archivo PDF de solicitud generado listo para enviárselo.`;

        const whatsappUrl = `https://api.whatsapp.com/send?phone=523314251147&text=${encodeURIComponent(mensajeExpress)}`;
        window.open(whatsappUrl, '_blank');
    }
</script>
</body>
</html>
